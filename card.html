<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Profile Card • Darkside</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Playfair+Display:ital,wght@0,300;1,400&family=Rajdhani:wght@700&family=Press+Start+2P&family=Pacifico&family=Cinzel:wght@700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      overflow: hidden;
      background: #0a0a0a;
    }
    .card-container {
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }
    .video-background {
      position: absolute;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 0;
    }
    .video-background video {
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      position: absolute;
      top: 0;
      left: 0;
      pointer-events: none;
      border: none;
    }
    .overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
    }
    .card-content {
      position: relative;
      z-index: 2;
      text-align: center;
      padding: 40px;
    }
    .username {
      font-size: 48px;
      font-weight: 700;
      margin-bottom: 16px;
      text-shadow: 0 2px 10px rgba(0,0,0,0.5);
    }
    .badge {
      display: inline-block;
      padding: 8px 20px;
      border-radius: 30px;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 20px;
      text-shadow: 0 1px 5px rgba(0,0,0,0.3);
    }
    .bio {
      font-size: 18px;
      margin-bottom: 32px;
      max-width: 600px;
      line-height: 1.6;
      text-shadow: 0 1px 5px rgba(0,0,0,0.3);
    }
    .social-links {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .social-link {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      text-decoration: none;
      transition: transform 0.2s, box-shadow 0.2s;
      backdrop-filter: blur(10px);
    }
    .social-link:hover {
      transform: scale(1.1);
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }
    .error-message {
      position: relative;
      z-index: 2;
      text-align: center;
      padding: 40px;
    }
    .error-message h1 {
      font-size: 32px;
      margin-bottom: 16px;
    }
    .error-message p {
      font-size: 16px;
      opacity: 0.7;
    }
    .error-message a {
      color: inherit;
      text-decoration: underline;
    }
    .loading {
      position: relative;
      z-index: 2;
      text-align: center;
    }
    .loading i {
      font-size: 48px;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    .card-avatar {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid rgba(255,255,255,0.2);
      margin-bottom: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }
    
    /* Amazing Text Effects */
    .text-rainbow {
      background: linear-gradient(45deg, #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #4b0082, #9400d3, #ff0000);
      background-size: 400% 400%;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: rainbow 3s ease infinite;
    }
    
    @keyframes rainbow {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    
    .text-sparkle {
      position: relative;
      color: #fff;
      animation: sparkle 2s linear infinite;
    }
    
    .text-sparkle::before {
      content: attr(data-text);
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(45deg, transparent 30%, rgba(255,255,255,0.5) 50%, transparent 70%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: shimmer 3s infinite;
    }
    
    @keyframes sparkle {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.8; }
    }
    
    @keyframes shimmer {
      0% { background-position: -200% center; }
      100% { background-position: 200% center; }
    }
    
    .text-glow {
      color: #fff;
      text-shadow: 0 0 10px currentColor, 0 0 20px currentColor, 0 0 30px currentColor, 0 0 40px currentColor;
      animation: glow-pulse 2s ease-in-out infinite alternate;
    }
    
    @keyframes glow-pulse {
      from { text-shadow: 0 0 10px currentColor, 0 0 20px currentColor, 0 0 30px currentColor; }
      to { text-shadow: 0 0 20px currentColor, 0 0 30px currentColor, 0 0 40px currentColor, 0 0 50px currentColor; }
    }
    
    .text-neon {
      color: #fff;
      text-shadow: 
        0 0 7px #fff,
        0 0 10px #fff,
        0 0 21px #fff,
        0 0 42px #0fa,
        0 0 82px #0fa,
        0 0 92px #0fa,
        0 0 102px #0fa,
        0 0 151px #0fa;
      animation: neon-flicker 1.5s infinite alternate;
    }
    
    @keyframes neon-flicker {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.8; }
    }
    
    .text-fire {
      background: linear-gradient(to top, #ff0000, #ff7f00, #ffff00, #ffffff);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: fire-dance 1.5s ease-in-out infinite alternate;
    }
    
    @keyframes fire-dance {
      0% { transform: scale(1) translateY(0); }
      100% { transform: scale(1.05) translateY(-2px); }
    }
    
    .text-ice {
      background: linear-gradient(45deg, #00d4ff, #0099cc, #006699, #00d4ff);
      background-size: 200% 200%;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: ice-shimmer 3s ease-in-out infinite;
    }
    
    @keyframes ice-shimmer {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }
    
    .text-galaxy {
      background: linear-gradient(45deg, #667eea 0%, #764ba2 25%, #f093fb 50%, #c471f5 75%, #667eea 100%);
      background-size: 400% 400%;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: galaxy-rotate 8s linear infinite;
    }
    
    @keyframes galaxy-rotate {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    
    .text-matrix {
      color: #0f0;
      text-shadow: 0 0 5px #0f0, 0 0 10px #0f0;
      font-family: 'Courier New', monospace;
      animation: matrix-rain 2s linear infinite;
    }
    
    @keyframes matrix-rain {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; text-shadow: 0 0 5px #0f0, 0 0 15px #0f0, 0 0 25px #0f0; }
    }
    
    .text-holographic {
      background: linear-gradient(45deg, #ff0080, #ff8c00, #40e0d0, #ff0080);
      background-size: 300% 300%;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: holographic-shift 4s ease-in-out infinite;
    }
    
    @keyframes holographic-shift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    
    /* Font Styles */
    .font-cyberpunk {
      font-family: 'Orbitron', 'Courier New', monospace;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 2px;
    }
    
    .font-elegant {
      font-family: 'Playfair Display', 'Georgia', serif;
      font-weight: 300;
      font-style: italic;
    }
    
    .font-futuristic {
      font-family: 'Rajdhani', 'Arial', sans-serif;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 3px;
    }
    
    .font-retro {
      font-family: 'Press Start 2P', 'Courier New', monospace;
      font-weight: 400;
    }
    
    .font-brush {
      font-family: 'Pacifico', 'cursive', sans-serif;
      font-weight: 400;
    }
    
    .font-gothic {
      font-family: 'Cinzel', 'Georgia', serif;
      font-weight: 700;
      text-transform: uppercase;
    }
    
    /* Audio Player Styles */
    .audio-player {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: rgba(0, 0, 0, 0.9);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 12px;
      z-index: 1000;
      min-width: 200px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    }
    
    .audio-controls {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    
    .audio-btn {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border: none;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      cursor: pointer;
      transition: all 0.3s ease;
      font-size: 14px;
    }
    
    .audio-btn:hover {
      transform: scale(1.1);
      box-shadow: 0 4px 16px rgba(102, 126, 234, 0.4);
    }
    
    .audio-btn:active {
      transform: scale(0.95);
    }
    
    .audio-info {
      flex: 1;
    }
    
    .audio-title {
      color: #fff;
      font-size: 12px;
      font-weight: 500;
      display: block;
    }
    
    .volume-slider {
      width: 60px;
      height: 4px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 2px;
      outline: none;
      -webkit-appearance: none;
      appearance: none;
      cursor: pointer;
    }
    
    .volume-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 12px;
      height: 12px;
      background: #667eea;
      border-radius: 50%;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    
    .volume-slider::-webkit-slider-thumb:hover {
      background: #764ba2;
      transform: scale(1.2);
    }
    
    .volume-slider::-moz-range-thumb {
      width: 12px;
      height: 12px;
      background: #667eea;
      border-radius: 50%;
      cursor: pointer;
      border: none;
      transition: all 0.2s ease;
    }
    
    .volume-slider::-moz-range-thumb:hover {
      background: #764ba2;
      transform: scale(1.2);
    }
    
    /* Mobile Responsive */
    @media (max-width: 768px) {
      .audio-player {
        bottom: 10px;
        right: 10px;
        left: 10px;
        min-width: auto;
      }
      
      .volume-slider {
        width: 40px;
      }
    }
  </style>
</head>
<body>
  <div id="cardContainer" class="card-container">
    <div class="loading">
      <i class="fa fa-spinner"></i>
    </div>
  </div>

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
    import { SUPABASE_ANON_KEY } from './keys.js';

    const supabase = createClient('https://ffmkkwskvjvytdddevmm.supabase.co', SUPABASE_ANON_KEY);

    async function loadCard() {
      // Simulate user interaction for audio autoplay
      document.addEventListener('click', function establishInteraction() {
        window.userHasInteracted = true;
        document.removeEventListener('click', establishInteraction);
      }, { once: true });
      
      // Auto-click to establish user interaction
      setTimeout(() => {
        if (!window.userHasInteracted) {
          document.body.click();
        }
      }, 100);

      const container = document.getElementById('cardContainer');
      const username = window.location.pathname.replace('/', '').toLowerCase();

      if (!username) {
        showError('No username specified');
        return;
      }

      try {
        const { data: card, error } = await supabase
          .from('profile_cards')
          .select('*')
          .ilike('username', username)
          .maybeSingle();

        if (error) throw error;

        if (!card || !card.enabled) {
          showError('Profile card not found');
          return;
        }
        
        // Debug: Log the full card data
        console.log('Card data from database:', card);

        // Fetch user's avatar from users table (no auth required)
        let avatarUrl = null;
        if (card.user_id) {
          const { data: userData } = await supabase
            .from('users')
            .select('avatar_url')
            .eq('id', card.user_id)
            .maybeSingle();
          avatarUrl = userData?.avatar_url || null;
        }

        renderCard(card, avatarUrl);
      } catch (err) {
        console.error('Load error:', err);
        showError('Error loading profile card');
      }
    }

    function renderCard(card, avatarUrl) {
      const container = document.getElementById('cardContainer');

      let videoHtml = '';
      let audioHtml = '';
      if (card.video_url) {
        videoHtml = `<video class="video-background" autoplay muted loop playsinline><source src="${card.video_url}" type="video/mp4"></video>`;
        videoHtml += '<div class="overlay"></div>';
      }
      
      // Add audio player if enabled
      if (card.enable_audio_player && (card.video_url || card.audio_url)) {
        const audioSource = card.audio_url || card.video_url;
        const audioTitle = card.audio_title || 'Background Music';
        
        // Determine audio type based on file extension
        let audioType = 'audio/mp4';
        if (audioSource.includes('.mp3')) {
          audioType = 'audio/mpeg';
        } else if (audioSource.includes('.wav')) {
          audioType = 'audio/wav';
        } else if (audioSource.includes('.ogg')) {
          audioType = 'audio/ogg';
        }
        
        audioHtml = `
          <div class="audio-player">
            <audio id="bgAudio" loop>
              <source src="${audioSource}" type="${audioType}">
              <source src="${audioSource}" type="audio/mpeg">
              <source src="${audioSource}" type="audio/mp4">
            </audio>
            <div class="audio-controls">
              <button id="playPauseBtn" class="audio-btn">
                <i class="fa fa-play"></i>
              </button>
              <div class="audio-info">
                <span class="audio-title">🎵 ${audioTitle}</span>
              </div>
              <input type="range" id="volumeSlider" class="volume-slider" min="0" max="100" value="50">
            </div>
          </div>
        `;
      }

      const overlayHtml = `<div class="overlay" style="background: ${card.background_color}${card.video_url ? 'aa' : ''}"></div>`;

      const socialLinksHtml = card.social_links && card.social_links.length > 0
        ? card.social_links.map(link => {
            const icon = getSocialIcon(link.platform);
            return `<a href="${link.url}" class="social-link" style="background: ${card.accent_color}33; color: ${card.text_color};" target="_blank" rel="noopener"><i class="${icon}"></i></a>`;
          }).join('')
        : '';

      const bioHtml = card.bio ? `<p class="bio" style="color: ${card.text_color};">${card.bio}</p>` : '';

      const badgeHtml = card.badge ? `<div class="badge" style="background: ${card.accent_color}; color: #fff;">${card.badge}</div>` : '';
      const avatarHtml = avatarUrl ? `<img src="${avatarUrl}" class="card-avatar" alt="Avatar" style="border-color: ${card.accent_color || '#7c3aed'};">` : '';

      // Apply text effects and fonts
      const usernameEffect = card.username_effect || 'none';
      const usernameFont = card.username_font || 'default';
      const badgeEffect = card.badge_effect || 'none';
      const badgeFont = card.badge_font || 'default';
      const bioEffect = card.bio_effect || 'none';
      const bioFont = card.bio_font || 'default';
      
      // Debug: Log the effects to console
      console.log('Text Effects:', {
        usernameEffect,
        usernameFont,
        badgeEffect,
        badgeFont,
        bioEffect,
        bioFont
      });
      
      container.innerHTML = `
        ${videoHtml}
        ${audioHtml}
        ${overlayHtml}
        <div class="card-content">
          ${avatarHtml}
          <h1 class="username ${usernameEffect} ${usernameFont}" style="color: ${card.text_color};">${card.username}</h1>
          ${badgeHtml ? `<div class="badge ${badgeEffect} ${badgeFont}" style="background: ${card.accent_color}; color: #fff;">${card.badge}</div>` : ''}
          ${bioHtml ? `<p class="bio ${bioEffect} ${bioFont}" style="color: ${card.text_color};">${card.bio}</p>` : ''}
          <div class="social-links">
            ${socialLinksHtml}
          </div>
        </div>
      `;

      // Setup audio player controls
      if (card.video_url) {
        setupAudioPlayer();
        // Auto-click play button multiple times
        setTimeout(autoClickPlayButton, 500);
        setTimeout(autoClickPlayButton, 1000);
        setTimeout(autoClickPlayButton, 2000);
        setTimeout(autoClickPlayButton, 3000);
      }
    }

    function setupAudioPlayer() {
      const audio = document.getElementById('bgAudio');
      const playPauseBtn = document.getElementById('playPauseBtn');
      const volumeSlider = document.getElementById('volumeSlider');

      if (!audio || !playPauseBtn || !volumeSlider) {
        console.log('Audio player elements not found');
        return;
      }

      // Set initial volume
      audio.volume = 0.5;
      
      // Debug: Log audio source
      console.log('Audio source:', audio.querySelector('source').src);

      // Play/Pause functionality
      playPauseBtn.addEventListener('click', () => {
        if (audio.paused) {
          audio.play().then(() => {
            console.log('Audio playing successfully');
            playPauseBtn.innerHTML = '<i class="fa fa-pause"></i>';
          }).catch(err => {
            console.error('Audio play failed:', err);
            // Try alternative play method
            audio.load();
            audio.play().then(() => {
              console.log('Audio playing on second attempt');
              playPauseBtn.innerHTML = '<i class="fa fa-pause"></i>';
            }).catch(err2 => {
              console.error('Audio still failed:', err2);
            });
          });
        } else {
          audio.pause();
          playPauseBtn.innerHTML = '<i class="fa fa-play"></i>';
        }
      });

      // Volume control
      volumeSlider.addEventListener('input', (e) => {
        audio.volume = e.target.value / 100;
      });

      // Update button when audio ends
      audio.addEventListener('ended', () => {
        playPauseBtn.innerHTML = '<i class="fa fa-play"></i>';
      });
      
      // Log audio events for debugging
      audio.addEventListener('loadstart', () => console.log('Audio loading started'));
      audio.addEventListener('canplay', () => console.log('Audio can play'));
      audio.addEventListener('error', (e) => console.error('Audio error:', e));
    }

    function autoClickPlayButton() {
      try {
        console.log('Attempting to auto-click play button...');
        
        // Method 1: Direct ID click
        let playButton = document.getElementById('playPauseBtn');
        if (playButton) {
          console.log('Found play button by ID, clicking...');
          playButton.click();
          return;
        }
        
        // Method 2: XPath fallback
        console.log('Trying XPath fallback...');
        const xpathResult = document.evaluate('//*[@id="playPauseBtn"]/i', document, null, XPathResult.FIRST_ORDERED_NODE_TYPE, null);
        const iconElement = xpathResult.singleNodeValue;
        
        if (iconElement) {
          console.log('Found play button icon by XPath, clicking parent...');
          iconElement.parentElement.click();
          return;
        }
        
        // Method 3: Alternative XPath
        console.log('Trying alternative XPath...');
        const xpathResult2 = document.evaluate('//*[@id="playPauseBtn"]', document, null, XPathResult.FIRST_ORDERED_NODE_TYPE, null);
        const buttonElement = xpathResult2.singleNodeValue;
        
        if (buttonElement) {
          console.log('Found play button by alternative XPath, clicking...');
          buttonElement.click();
          return;
        }
        
        console.log('Play button not found, retrying in 2 seconds...');
        setTimeout(autoClickPlayButton, 2000);
        
      } catch (err) {
        console.error('Auto-click failed:', err);
        // Retry after 3 seconds
        setTimeout(autoClickPlayButton, 3000);
      }
    }

    function getSocialIcon(platform) {
      const icons = {
        'discord': 'fab fa-discord',
        'telegram': 'fab fa-telegram',
        'twitter': 'fab fa-twitter',
        'github': 'fab fa-github',
        'youtube': 'fab fa-youtube',
        'instagram': 'fab fa-instagram',
        'tiktok': 'fab fa-tiktok',
        'website': 'fa fa-globe'
      };
      return icons[platform] || 'fa fa-link';
    }

    function showError(message) {
      const container = document.getElementById('cardContainer');
      container.innerHTML = `
        <div class="error-message" style="color: #fff;">
          <h1>${message}</h1>
          <p><a href="/">Return to Darkside</a></p>
        </div>
      `;
    }

    loadCard();
  </script>
</body>
</html>
