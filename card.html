<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Profile Card • Darkside</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Playfair+Display:ital,wght@0,300;1,400&family=Rajdhani:wght@700&family=Press+Start+2P&family=Pacifico&family=Cinzel:wght@700&family=Bebas+Neue&family=Lobster&family=Montserrat:wght@700;900&family=Roboto+Mono:wght@700&family=Dancing+Script:wght@700&family=Black+Ops+One&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #0a0a0a; }
    .card-container {
      width: 100vw; height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; position: relative; overflow: hidden;
    }
    /* Card entrance animation */
    .card-content {
      position: relative; z-index: 2; text-align: center; padding: 40px;
      animation: cardEnter 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      opacity: 0;
      transform: translateY(30px) scale(0.95);
      display: flex; flex-direction: column; align-items: center;
      gap: 8px;
    }
    @keyframes cardEnter {
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    .card-content > * {
      animation: fadeInUp 0.6s ease forwards;
      opacity: 0;
    }
    .card-content .card-avatar { animation-delay: 0.1s; }
    .card-content .username { animation-delay: 0.2s; }
    .card-content .badge { animation-delay: 0.3s; }
    .card-content .bio { animation-delay: 0.4s; }
    .card-content .social-links { animation-delay: 0.5s; }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    /* Avatar hover */
    .card-avatar {
      width: 100px; height: 100px; border-radius: 50%; object-fit: cover;
      border: 3px solid rgba(255,255,255,0.2);
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
      transition: all 0.3s ease;
    }
    .card-avatar:hover {
      transform: scale(1.05);
      box-shadow: 0 8px 30px rgba(0,0,0,0.4);
    }
    /* Enhanced username */
    .username { font-size: 52px; font-weight: 700; text-shadow: 0 2px 10px rgba(0,0,0,0.5); }
    /* Badge glow */
    .badge {
      display: inline-block; padding: 8px 20px; border-radius: 30px;
      font-size: 14px; font-weight: 600;
      text-shadow: 0 1px 5px rgba(0,0,0,0.3);
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }
    /* Bio */
    .bio { font-size: 18px; max-width: 600px; line-height: 1.6; text-shadow: 0 1px 5px rgba(0,0,0,0.3); }
    /* Social links enhanced */
    .social-links { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; margin-top: 8px; }
    .social-link {
      width: 56px; height: 56px; border-radius: 50%; display: flex;
      align-items: center; justify-content: center; font-size: 24px;
      text-decoration: none; transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); backdrop-filter: blur(10px);
    }
    .social-link:hover { transform: scale(1.15) translateY(-3px); box-shadow: 0 8px 25px rgba(0,0,0,0.4); }
    /* Animated Social Buttons */
    .social-link.animated {
      animation: socialPop 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) backwards;
    }
    .social-link.animated:nth-child(1) { animation-delay: 0.5s; }
    .social-link.animated:nth-child(2) { animation-delay: 0.6s; }
    .social-link.animated:nth-child(3) { animation-delay: 0.7s; }
    .social-link.animated:nth-child(4) { animation-delay: 0.8s; }
    .social-link.animated:nth-child(5) { animation-delay: 0.9s; }
    .social-link.animated:nth-child(6) { animation-delay: 1.0s; }
    .social-link.animated:nth-child(7) { animation-delay: 1.1s; }
    .social-link.animated:nth-child(8) { animation-delay: 1.2s; }
    @keyframes socialPop {
      0% { opacity: 0; transform: scale(0) rotate(-180deg); }
      100% { opacity: 1; transform: scale(1) rotate(0deg); }
    }
    .social-link.animated:hover {
      animation: socialBounce 0.4s ease;
    }
    @keyframes socialBounce {
      0%, 100% { transform: scale(1.15) translateY(-3px); }
      50% { transform: scale(1.25) translateY(-5px); }
    }
    /* Loading */
    .loading { position: relative; z-index: 2; text-align: center; }
    .loading i { font-size: 48px; animation: spin 1s linear infinite; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    .error-message { position: relative; z-index: 2; text-align: center; padding: 40px; }
    .error-message h1 { font-size: 32px; margin-bottom: 16px; }
    .error-message p { font-size: 16px; opacity: 0.7; }
    .error-message a { color: inherit; text-decoration: underline; }
    .video-background {
      position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 0;
    }
    .video-background video {
      width: 100vw; height: 100vh; object-fit: cover; position: absolute;
      top: 0; left: 0; pointer-events: none; border: none;
    }
    .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
    /* Amazing Text Effects */
    .text-rainbow {
      display: inline-block;
      background: linear-gradient(45deg, #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #4b0082, #9400d3, #ff0000);
      background-size: 400% 400%; -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent; animation: rainbow 3s ease infinite;
      text-shadow: none !important;
    }
    .rainbow-text {
      background: linear-gradient(90deg, #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #4b0082, #9400d3, #ff0000);
      background-size: 400% 400%;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: rainbow-shift 3s ease infinite;
      text-shadow: none !important;
    }
    @keyframes rainbow {
      0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; }
    }
    .text-sparkle { position: relative; color: #fff; animation: sparkle 2s linear infinite; }
    .text-sparkle::before {
      content: attr(data-text); position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: linear-gradient(45deg, transparent 30%, rgba(255,255,255,0.5) 50%, transparent 70%);
      -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
      animation: shimmer 3s infinite;
    }
    @keyframes sparkle { 0%, 100% { opacity: 1; } 50% { opacity: 0.8; } }
    @keyframes shimmer { 0% { background-position: -200% center; } 100% { background-position: 200% center; } }
    .text-glow {
      color: #fff; text-shadow: 0 0 10px currentColor, 0 0 20px currentColor, 0 0 30px currentColor, 0 0 40px currentColor;
      animation: glow-pulse 2s ease-in-out infinite alternate;
    }
    @keyframes glow-pulse {
      from { text-shadow: 0 0 10px currentColor, 0 0 20px currentColor, 0 0 30px currentColor; }
      to { text-shadow: 0 0 20px currentColor, 0 0 30px currentColor, 0 0 40px currentColor, 0 0 50px currentColor; }
    }
    .text-neon {
      color: #fff; text-shadow: 0 0 7px #fff, 0 0 10px #fff, 0 0 21px #fff, 0 0 42px #0fa, 0 0 82px #0fa, 0 0 92px #0fa, 0 0 102px #0fa, 0 0 151px #0fa;
      animation: neon-flicker 1.5s infinite alternate;
    }
    @keyframes neon-flicker { 0%, 100% { opacity: 1; } 50% { opacity: 0.8; } }
    .text-fire {
      display: inline-block;
      background: linear-gradient(to top, #ff0000, #ff7f00, #ffff00, #ffffff);
      -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
      animation: fire-dance 1.5s ease-in-out infinite alternate;
    }
    @keyframes fire-dance { 0% { transform: scale(1) translateY(0); } 100% { transform: scale(1.05) translateY(-2px); } }
    .text-ice {
      display: inline-block;
      background: linear-gradient(45deg, #00d4ff, #0099cc, #006699, #00d4ff);
      background-size: 200% 200%; -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent; animation: ice-shimmer 3s ease-in-out infinite;
    }
    @keyframes ice-shimmer { 0%, 100% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } }
    .text-galaxy {
      display: inline-block;
      background: linear-gradient(45deg, #667eea 0%, #764ba2 25%, #f093fb 50%, #c471f5 75%, #667eea 100%);
      background-size: 400% 400%; -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent; animation: galaxy-rotate 8s linear infinite;
    }
    @keyframes galaxy-rotate { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
    .text-matrix { color: #0f0; text-shadow: 0 0 5px #0f0, 0 0 10px #0f0; font-family: 'Courier New', monospace; animation: matrix-rain 2s linear infinite; }
    @keyframes matrix-rain { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; text-shadow: 0 0 5px #0f0, 0 0 15px #0f0, 0 0 25px #0f0; } }
    .text-holographic {
      display: inline-block;
      background: linear-gradient(45deg, #ff0080, #ff8c00, #40e0d0, #ff0080);
      background-size: 300% 300%; -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent; animation: holographic-shift 4s ease-in-out infinite;
    }
    @keyframes holographic-shift { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
    /* Font Styles */
    .font-cyberpunk { font-family: 'Orbitron', 'Courier New', monospace; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; }
    .font-elegant { font-family: 'Playfair Display', 'Georgia', serif; font-weight: 300; font-style: italic; }
    .font-futuristic { font-family: 'Rajdhani', 'Arial', sans-serif; font-weight: 700; text-transform: uppercase; letter-spacing: 3px; }
    .font-retro { font-family: 'Press Start 2P', 'Courier New', monospace; font-weight: 400; }
    .font-brush { font-family: 'Pacifico', 'cursive', sans-serif; font-weight: 400; }
    .font-gothic { font-family: 'Cinzel', 'Georgia', serif; font-weight: 700; text-transform: uppercase; }
    .font-bebas { font-family: 'Bebas Neue', sans-serif; font-weight: 400; letter-spacing: 3px; }
    .font-lobster { font-family: 'Lobster', cursive; font-weight: 400; }
    .font-montserrat { font-family: 'Montserrat', sans-serif; font-weight: 900; text-transform: uppercase; }
    .font-mono { font-family: 'Roboto Mono', monospace; font-weight: 700; }
    .font-script { font-family: 'Dancing Script', cursive; font-weight: 700; }
    .font-military { font-family: 'Black Ops One', cursive; font-weight: 400; text-transform: uppercase; }
    /* Audio Player Styles - Beautiful & Customizable */
    .audio-player {
      position: fixed; z-index: 1000;
      background: rgba(10, 10, 10, 0.95);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 16px; padding: 14px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      animation: playerSlideIn 0.6s ease backwards;
    }
    @keyframes playerSlideIn {
      from { opacity: 0; transform: translateY(20px) scale(0.9); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    /* Positions */
    .audio-player.pos-bottom-right { bottom: 20px; right: 20px; }
    .audio-player.pos-bottom-left { bottom: 20px; left: 20px; }
    .audio-player.pos-top-right { top: 20px; right: 20px; }
    .audio-player.pos-top-left { top: 20px; left: 20px; }
    /* Themes */
    .audio-player.theme-accent .audio-btn { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
    .audio-player.theme-accent .volume-slider::-webkit-slider-thumb { background: #667eea; }
    .audio-player.theme-rainbow { border: 1px solid transparent; background: linear-gradient(rgba(10,10,10,0.95), rgba(10,10,10,0.95)) padding-box, linear-gradient(45deg, #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #9400d3) border-box; }
    .audio-player.theme-rainbow .audio-btn { background: linear-gradient(45deg, #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #9400d3); background-size: 400% 400%; animation: rainbow 3s ease infinite; }
    .audio-player.theme-neon { box-shadow: 0 0 20px rgba(0, 255, 170, 0.3), 0 8px 32px rgba(0,0,0,0.5); border-color: rgba(0, 255, 170, 0.3); }
    .audio-player.theme-neon .audio-btn { background: #0fa; box-shadow: 0 0 15px #0fa; color: #000; }
    .audio-player.theme-neon .volume-slider::-webkit-slider-thumb { background: #0fa; box-shadow: 0 0 10px #0fa; }
    .audio-player.theme-dark { background: rgba(0, 0, 0, 0.98); border-color: rgba(255,255,255,0.05); }
    /* Styles */
    .audio-player.style-full { min-width: 240px; }
    .audio-player.style-minimal { min-width: auto; padding: 10px; }
    .audio-player.style-minimal .audio-info, .audio-player.style-minimal .volume-slider, .audio-player.style-minimal .audio-cover { display: none; }
    .audio-player.style-compact { min-width: 180px; }
    .audio-player.style-compact .audio-cover { display: none; }
    .audio-controls { display: flex; align-items: center; gap: 12px; }
    .audio-btn {
      border: none; border-radius: 50%; width: 44px; height: 44px;
      display: flex; align-items: center; justify-content: center;
      color: white; cursor: pointer; transition: all 0.3s ease; font-size: 14px;
      flex-shrink: 0;
    }
    .audio-btn:hover { transform: scale(1.15); }
    .audio-btn:active { transform: scale(0.9); }
    .audio-info { flex: 1; min-width: 0; }
    .audio-title { color: #fff; font-size: 12px; font-weight: 600; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .volume-slider {
      width: 60px; height: 4px; background: rgba(255, 255, 255, 0.15); border-radius: 2px;
      outline: none; -webkit-appearance: none; appearance: none; cursor: pointer;
    }
    .volume-slider::-webkit-slider-thumb {
      -webkit-appearance: none; appearance: none; width: 14px; height: 14px;
      border-radius: 50%; cursor: pointer; transition: all 0.2s ease;
    }
    .volume-slider::-webkit-slider-thumb:hover { transform: scale(1.3); }
    .volume-slider::-moz-range-thumb {
      width: 14px; height: 14px; border-radius: 50%;
      cursor: pointer; border: none; transition: all 0.2s ease;
    }
    .volume-slider::-moz-range-thumb:hover { transform: scale(1.3); }
    /* Audio Cover */
    .audio-cover { display: flex; align-items: center; flex-shrink: 0; }
    .audio-cover img { box-shadow: 0 4px 15px rgba(0,0,0,0.4); border-radius: 8px; }
    /* Autohide */
    .audio-player.autohide { opacity: 0.4; transform: scale(0.9); }
    .audio-player.autohide:hover { opacity: 1; transform: scale(1); }
    .audio-player.autohide.playing { opacity: 1; transform: scale(1); }
    /* Visualizers */
    .audio-visualizer { display: flex; align-items: flex-end; gap: 2px; height: 20px; margin-left: 8px; }
    .viz-bar { width: 3px; background: linear-gradient(to top, #667eea, #764ba2); border-radius: 2px; animation: vizBounce 1s ease-in-out infinite; }
    .viz-bar:nth-child(1) { animation-delay: 0s; height: 30%; }
    .viz-bar:nth-child(2) { animation-delay: 0.1s; height: 60%; }
    .viz-bar:nth-child(3) { animation-delay: 0.2s; height: 40%; }
    .viz-bar:nth-child(4) { animation-delay: 0.3s; height: 80%; }
    .viz-bar:nth-child(5) { animation-delay: 0.15s; height: 50%; }
    @keyframes vizBounce { 0%, 100% { transform: scaleY(0.5); } 50% { transform: scaleY(1); } }
    /* Pulse visualizer */
    .viz-pulse { width: 20px; height: 20px; border-radius: 50%; border: 2px solid #667eea; animation: vizPulse 1.5s ease-out infinite; margin-left: 8px; }
    @keyframes vizPulse { 0% { transform: scale(0.8); opacity: 1; } 100% { transform: scale(1.5); opacity: 0; } }
    /* Wave visualizer */
    .viz-wave { display: flex; align-items: center; gap: 1px; height: 20px; margin-left: 8px; }
    .viz-wave span { display: block; width: 2px; background: linear-gradient(to top, #667eea, #764ba2); border-radius: 1px; animation: vizWave 0.8s ease-in-out infinite alternate; }
    .viz-wave span:nth-child(1) { height: 8px; animation-delay: 0s; }
    .viz-wave span:nth-child(2) { height: 14px; animation-delay: 0.1s; }
    .viz-wave span:nth-child(3) { height: 10px; animation-delay: 0.2s; }
    .viz-wave span:nth-child(4) { height: 16px; animation-delay: 0.15s; }
    .viz-wave span:nth-child(5) { height: 6px; animation-delay: 0.25s; }
    @keyframes vizWave { from { transform: scaleY(0.3); } to { transform: scaleY(1); } }
    
    /* Rainbow Text Animation */
    .rainbow-text {
      display: inline-block;
      background: linear-gradient(90deg, #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #4b0082, #9400d3, #ff0000);
      background-size: 400% 400%;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: rainbow-shift 3s ease infinite;
      text-shadow: none !important;
    }
    @keyframes rainbow-shift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    
    /* Glitch Effect */
    @keyframes glitch {
      0% { transform: translate(0); }
      20% { transform: translate(-2px, 2px); }
      40% { transform: translate(-2px, -2px); }
      60% { transform: translate(2px, 2px); }
      80% { transform: translate(2px, -2px); }
      100% { transform: translate(0); }
    }
    
    /* Layout Styles */
    .layout-left .card-content { align-items: flex-start; text-align: left; padding-left: 60px; }
    .layout-right .card-content { align-items: flex-end; text-align: right; padding-right: 60px; }
    .layout-compact .card-content { padding: 20px; }
    .layout-compact .username { font-size: 36px; }
    .layout-compact .bio { font-size: 16px; }
    .layout-compact .card-avatar { width: 80px; height: 80px; }
    
    @media (max-width: 768px) {
      .audio-player { bottom: 10px; right: 10px; left: 10px; min-width: auto; }
      .volume-slider { width: 40px; }
      .layout-left .card-content { padding-left: 20px; }
      .layout-right .card-content { padding-right: 20px; }
    }
  </style>
</head>
<body>
  <div id="cardContainer" class="card-container">
    <div class="loading"><i class="fa fa-spinner"></i></div>
  </div>

  <script type="module" src="./card-app.js?v=6"></script>
</body>
</html>
