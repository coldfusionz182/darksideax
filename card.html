<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Profile Card • Darkside</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      overflow: hidden;
      background: #0a0a0a;
    }
    .card-container {
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }
    .card-container .video-background,
    .card-container .video-background iframe {
      pointer-events: none !important;
    }
    .video-background {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }
    .video-background iframe {
      width: 300%;
      height: 300%;
      object-fit: cover;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      border: none;
      user-select: none;
    }
    .video-background video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      position: absolute;
      top: 0;
      left: 0;
      pointer-events: none;
      border: none;
    }
    .overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
    }
    .card-content {
      position: relative;
      z-index: 2;
      text-align: center;
      padding: 40px;
    }
    .username {
      font-size: 48px;
      font-weight: 700;
      margin-bottom: 16px;
      text-shadow: 0 2px 10px rgba(0,0,0,0.5);
    }
    .badge {
      display: inline-block;
      padding: 8px 20px;
      border-radius: 30px;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 20px;
      text-shadow: 0 1px 5px rgba(0,0,0,0.3);
    }
    .bio {
      font-size: 18px;
      margin-bottom: 32px;
      max-width: 600px;
      line-height: 1.6;
      text-shadow: 0 1px 5px rgba(0,0,0,0.3);
    }
    .social-links {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .social-link {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      text-decoration: none;
      transition: transform 0.2s, box-shadow 0.2s;
      backdrop-filter: blur(10px);
    }
    .social-link:hover {
      transform: scale(1.1);
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }
    .error-message {
      position: relative;
      z-index: 2;
      text-align: center;
      padding: 40px;
    }
    .error-message h1 {
      font-size: 32px;
      margin-bottom: 16px;
    }
    .error-message p {
      font-size: 16px;
      opacity: 0.7;
    }
    .error-message a {
      color: inherit;
      text-decoration: underline;
    }
    .loading {
      position: relative;
      z-index: 2;
      text-align: center;
    }
    .loading i {
      font-size: 48px;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    .card-avatar {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid rgba(255,255,255,0.2);
      margin-bottom: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }
    .unmute-btn {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 10;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: rgba(0,0,0,0.6);
      border: 1px solid rgba(255,255,255,0.2);
      color: #fff;
      font-size: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      backdrop-filter: blur(10px);
      transition: background 0.2s, transform 0.2s;
    }
    .unmute-btn:hover {
      background: rgba(255,255,255,0.15);
      transform: scale(1.1);
    }
    .unmute-btn.hidden {
      display: none;
    }
  </style>
</head>
<body>
  <div id="cardContainer" class="card-container">
    <div class="loading">
      <i class="fa fa-spinner"></i>
    </div>
  </div>

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
    import { SUPABASE_ANON_KEY } from './keys.js';

    const supabase = createClient('https://ffmkkwskvjvytdddevmm.supabase.co', SUPABASE_ANON_KEY);

    async function loadCard() {
      const container = document.getElementById('cardContainer');
      const username = window.location.pathname.replace('/', '').toLowerCase();

      if (!username) {
        showError('No username specified');
        return;
      }

      try {
        const { data: card, error } = await supabase
          .from('profile_cards')
          .select('*')
          .ilike('username', username)
          .maybeSingle();

        if (error) throw error;

        if (!card || !card.enabled) {
          showError('Profile card not found');
          return;
        }

        // Fetch user's avatar from users table
        let avatarUrl = null;
        if (card.user_id) {
          const { data: userData } = await supabase
            .from('users')
            .select('avatar_url')
            .eq('id', card.user_id)
            .maybeSingle();
          avatarUrl = userData?.avatar_url || null;
        }

        renderCard(card, avatarUrl);
      } catch (err) {
        console.error('Load error:', err);
        showError('Error loading profile card');
      }
    }

    function renderCard(card, avatarUrl) {
      const container = document.getElementById('cardContainer');

      let videoHtml = '';
      if (card.video_url) {
        videoHtml = getVideoEmbedHtml(card.video_url);
      }

      const overlayHtml = `<div class="overlay" style="background: ${card.background_color}${card.video_url ? 'aa' : ''}"></div>`;

      const socialLinksHtml = card.social_links && card.social_links.length > 0 
        ? card.social_links.map(link => {
            const icon = getSocialIcon(link.platform);
            return `<a href="${link.url}" class="social-link" style="background: ${card.accent_color}33; color: ${card.text_color};" target="_blank" rel="noopener"><i class="${icon}"></i></a>`;
          }).join('')
        : '';

      const bioHtml = card.bio ? `<p class="bio" style="color: ${card.text_color};">${card.bio}</p>` : '';

      const badgeHtml = card.badge ? `<div class="badge" style="background: ${card.accent_color}; color: #fff;">${card.badge}</div>` : '';
      const avatarHtml = avatarUrl ? `<img src="${avatarUrl}" class="card-avatar" alt="Avatar" style="border-color: ${card.accent_color || '#7c3aed'};">` : '';

      const unmuteBtnHtml = videoHtml ? `<button class="unmute-btn" id="unmuteBtn" title="Click to unmute"><i class="fa fa-volume-mute"></i></button>` : '';
      container.innerHTML = `
        ${videoHtml}
        ${overlayHtml}
        <div class="card-content">
          ${avatarHtml}
          <h1 class="username" style="color: ${card.text_color};">${card.username}</h1>
          ${badgeHtml}
          ${bioHtml}
          <div class="social-links">
            ${socialLinksHtml}
          </div>
        </div>
        ${unmuteBtnHtml}
      `;

      const unmuteBtn = document.getElementById('unmuteBtn');
      if (unmuteBtn) {
        unmuteBtn.addEventListener('click', () => {
          const vb = document.querySelector('.video-background');
          if (!vb) return;
          const platform = vb.dataset.platform;
          const id = vb.dataset.id;
          if (platform === 'direct') {
            const video = vb.querySelector('video');
            if (video) { video.muted = false; video.play(); }
          } else {
            const iframe = vb.querySelector('iframe');
            if (!iframe) return;
            if (platform === 'youtube') {
              iframe.src = `https://www.youtube.com/embed/${id}?autoplay=1&loop=1&playlist=${id}&controls=0&showinfo=0&rel=0&modestbranding=1&iv_load_policy=3&fs=0&disablekb=1&autohide=1&playsinline=1&cc_load_policy=0&enablejsapi=0`;
            } else if (platform === 'vimeo') {
              iframe.src = `https://player.vimeo.com/video/${id}?background=1&autoplay=1&loop=1&transparent=0`;
            } else if (platform === 'streamable') {
              iframe.src = `https://streamable.com/e/${id}?autoplay=1&loop=1`;
            }
          }
          unmuteBtn.classList.add('hidden');
        });
      }
    }

    function getSocialIcon(platform) {
      const icons = {
        'discord': 'fab fa-discord',
        'telegram': 'fab fa-telegram',
        'twitter': 'fab fa-twitter',
        'github': 'fab fa-github',
        'youtube': 'fab fa-youtube',
        'instagram': 'fab fa-instagram',
        'tiktok': 'fab fa-tiktok',
        'website': 'fa fa-globe'
      };
      return icons[platform] || 'fa fa-link';
    }

    function getVideoEmbedHtml(url) {
      if (!url) return '';

      // YouTube
      const ytMatch = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([a-zA-Z0-9_-]{11})/)
                   || url.match(/youtube\.com\/embed\/([a-zA-Z0-9_-]{11})/);
      if (ytMatch) {
        const id = ytMatch[1];
        return `
          <div class="video-background" data-platform="youtube" data-id="${id}">
            <iframe src="https://www.youtube.com/embed/${id}?autoplay=1&mute=1&loop=1&playlist=${id}&controls=0&showinfo=0&rel=0&modestbranding=1&iv_load_policy=3&fs=0&disablekb=1&autohide=1&playsinline=1&cc_load_policy=0&enablejsapi=0" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen title=" "></iframe>
          </div>
        `;
      }

      // Vimeo
      const vimeoMatch = url.match(/vimeo\.com\/(?:video\/)?(\d+)/);
      if (vimeoMatch) {
        return `
          <div class="video-background" data-platform="vimeo" data-id="${vimeoMatch[1]}">
            <iframe src="https://player.vimeo.com/video/${vimeoMatch[1]}?background=1&autoplay=1&loop=1&muted=1&transparent=0" frameborder="0" allow="autoplay; fullscreen" allowfullscreen></iframe>
          </div>
        `;
      }

      // Streamable
      const streamableMatch = url.match(/streamable\.com\/([a-zA-Z0-9]+)/);
      if (streamableMatch) {
        return `
          <div class="video-background" data-platform="streamable" data-id="${streamableMatch[1]}">
            <iframe src="https://streamable.com/e/${streamableMatch[1]}?autoplay=1&muted=1&loop=1" frameborder="0" allow="autoplay; fullscreen" allowfullscreen></iframe>
          </div>
        `;
      }

      // Direct MP4 / WebM / MOV (e.g. catbox.moe)
      if (/\.(mp4|webm|mov)(\?.*)?$/i.test(url) || /catbox\.moe/.test(url)) {
        return `
          <div class="video-background" data-platform="direct">
            <video autoplay muted loop playsinline>
              <source src="${url}" type="video/mp4">
            </video>
          </div>
        `;
      }

      return '';
    }

    function showError(message) {
      const container = document.getElementById('cardContainer');
      container.innerHTML = `
        <div class="error-message" style="color: #fff;">
          <h1>${message}</h1>
          <p><a href="/">Return to Darkside</a></p>
        </div>
      `;
    }

    loadCard();
  </script>
</body>
</html>
