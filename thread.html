<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Thread • Darkside.ax</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <link href="styles.css" rel="stylesheet">

  <style>
    body {
      background: radial-gradient(circle at top, #151826 0, #05060a 55%);
    }

    /* ====== Thread header ====== */
    .thread-header-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    .thread-title-main {
      font-size: 1.15rem;
      font-weight: 600;
    }

    .thread-tag-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 3px 8px;
      border-radius: 999px;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      background: rgba(88, 101, 242, 0.16);
      color: #c3c7ff;
    }
    .thread-tag-pill i {
      font-size: 0.7rem;
    }

    .thread-meta-row {
      margin-top: 4px;
      font-size: 0.8rem;
      color: #9ca3c9;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .thread-meta-row .dot {
      width: 4px;
      height: 4px;
      border-radius: 999px;
      background: #4b5563;
    }

    .thread-stats {
      margin-top: 6px;
      font-size: 0.8rem;
      color: #9ca3c9;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .thread-stats span {
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }

    /* ====== Main layout ====== */
    .thread-layout {
      display: grid;
      grid-template-columns: 240px minmax(0, 1fr);
      gap: 18px;
    }

    /* ====== Author sidebar ====== */
    .thread-sidebar {
      border-right: 1px solid #181c2d;
      padding-right: 14px;
      font-size: 0.85rem;
      color: #9ca3c9;
    }

    .author-avatar-wrapper {
      margin-bottom: 10px;
    }
    .author-avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid #181c2d;
      box-shadow: 0 0 12px rgba(0,0,0,0.6);
    }

    .author-name {
      font-size: 1.05rem;
      font-weight: 600;
      margin-bottom: 4px;
      color: #e5e7ff;
    }

    .author-rank {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #ffd37a;
      margin-bottom: 8px;
    }

    .author-meta {
      margin-top: 8px;
      font-size: 0.8rem;
    }
    .author-meta div + div {
      margin-top: 2px;
    }

    /* ====== Main content box ====== */
    .thread-content-box {
      background: #05070d;
      border-radius: 8px;
      border: 1px solid #181c2d;
      padding: 14px 16px;
      box-shadow: 0 0 18px rgba(0,0,0,0.7);
    }

    .thread-post-body-main {
      font-size: 0.95rem;
      line-height: 1.6;
      white-space: pre-wrap;
    }

    /* Links inside post body – inherit color so [color]+[url] works */
    .post-body a,
    .post-body a:link,
    .post-body a:visited,
    .post-body a:hover,
    .post-body a:active {
      color: inherit;
      text-decoration: underline;
    }

    /* ====== Replies box ====== */
    .thread-replies-box {
      margin-top: 18px;
      background: #05070d;
      border-radius: 8px;
      border: 1px solid #181c2d;
      padding: 12px 14px;
    }

    .reply-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
      font-size: 0.9rem;
    }

    .reply-form textarea {
      width: 100%;
      background: #050811;
      border: 1px solid #181c2d;
      border-radius: 4px;
      padding: 8px 10px;
      min-height: 80px;
      resize: vertical;
      color: #f5f6ff;
      font-size: 0.9rem;
    }

    .reply-form textarea:focus {
      outline: none;
      border-color: #5865f2;
      box-shadow: 0 0 0 1px rgba(88, 101, 242, 0.5);
    }

    .reply-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 8px;
      font-size: 0.8rem;
    }

    .replies-list {
      margin-top: 14px;
      border-top: 1px solid #181c2d;
      padding-top: 10px;
      font-size: 0.9rem;
    }

    .reply-item {
      border-bottom: 1px solid #101321;
      padding: 8px 0;
    }

    .reply-meta {
      font-size: 0.78rem;
      color: #a0a4c0;
      margin-bottom: 4px;
    }

    .reply-body {
      white-space: pre-wrap;
    }

    /* ====== Like area ====== */
    .thread-like-area {
      margin-top: 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.85rem;
    }

    .btn-like {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border-radius: 3px;
      border: 1px solid #303856;
      background: #141826;
      cursor: pointer;
      font-size: 0.8rem;
      color: #cbd0ff;
    }

    .btn-like i {
      font-size: 0.8rem;
    }

    .btn-like.liked {
      border-color: #22c55e;
      background: rgba(34, 197, 94, 0.12);
      color: #bbf7d0;
    }

    @media (max-width: 768px) {
      .thread-layout {
        grid-template-columns: 1fr;
      }
      .thread-sidebar {
        border-right: none;
        border-bottom: 1px solid #181c2d;
        padding-bottom: 10px;
        margin-bottom: 10px;
      }
    }
  </style>
</head>
<body>
<div id="page">
  <!-- HEADER -->
  <header id="header">
    <div class="wrapper header-inner">
      <div class="header-left">
        <div class="header-logo">
          <span class="logo-text">Darkside.ax</span>
          <span class="logo-slogan">Beyond the Limits</span>
        </div>
      </div>
      <div class="header-right">
        <ul class="top-links">
          <li><a href="#">Rules</a></li>
        </ul>
        <div class="auth-links">
          <a href="login.html" class="btn btn-small btn-outline">
            <i class="fa fa-sign-in-alt"></i> Login
          </a>
          <a href="#" class="btn btn-small btn-primary">
            <i class="fa fa-user-plus"></i> Register
          </a>
        </div>
      </div>
    </div>
  </header>

  <!-- NAVBAR -->
  <nav id="navbar">
    <div class="wrapper navbar-inner">
      <ul class="nav-main">
        <li><a href="index.html"><i class="fa fa-home"></i> Home</a></li>
        <li><a href="accounts.html" class="active"><i class="fa fa-user-tag"></i> Accounts</a></li>
      </ul>
    </div>
  </nav>

  <!-- CONTENT -->
  <main id="container">
    <div class="wrapper">
      <section class="category">
        <header class="cat-header">
          <div class="thread-header-bar">
            <span id="thread-title-display" class="thread-title-main">Loading thread...</span>
            <span class="thread-tag-pill" id="thread-tag-pill" style="display:none;">
              <i class="fa fa-tag"></i><span id="thread-tag-text"></span>
            </span>
          </div>
          <div class="thread-meta-row">
            <span id="thread-meta-display"></span>
            <span class="dot"></span>
            <span id="thread-created-at"></span>
          </div>
        </header>

        <div class="cat-body card-panel">
          <div class="thread-layout">
            <!-- left: author info -->
            <aside class="thread-sidebar">
              <div class="author-avatar-wrapper">
                <img id="thread-avatar-img" class="author-avatar"
                     src="images/default-avatar.png" alt="Avatar">
              </div>
              <div class="author-name" id="thread-author-name">Author</div>
              <div class="author-rank" id="thread-author-rank">Member</div>
              <div class="author-meta">
                <div id="thread-author-extra"></div>
              </div>
            </aside>

            <!-- right: content + replies -->
            <div>
              <!-- main content box -->
              <article class="thread-content-box">
                <div id="thread-content-display"
                     class="thread-post-body-main post-body">
                  <!-- filled via scripts.js -->
                </div>
              </article>

              <!-- replies box -->
              <section class="thread-replies-box">
                <div class="reply-header">
                  <span><i class="fa fa-comments"></i> Replies</span>
                  <span id="reply-info-text">Login to leave a reply.</span>
                </div>

                <form id="reply-form" class="reply-form">
                  <textarea id="reply-text" placeholder="Write your reply..."></textarea>
                  <div class="reply-actions">
                    <span id="reply-status"></span>
                    <button type="submit" class="btn btn-primary btn-small" id="reply-submit">
                      <i class="fa fa-paper-plane"></i> Post Reply
                    </button>
                  </div>
                </form>

                <div class="thread-like-area">
                  <button class="btn-like" id="thread-like-btn">
                    <i class="fa fa-heart"></i>
                    <span id="thread-like-text">Like</span>
                  </button>
                  <span id="thread-like-count">0 likes</span>
                </div>

                <div class="replies-list" id="replies-list">
                  <div class="reply-item" id="replies-placeholder">
                    <div class="reply-meta">No replies yet. Be the first to drop one.</div>
                  </div>
                </div>
              </section>

              <!-- back link -->
              <div class="card-panel" style="margin-top:15px;">
                <a href="accounts.html"><i class="fa fa-arrow-left"></i> Back to Accounts</a>
              </div>
            </div>
          </div>
        </div>
      </section>
    </div>
  </main>
</div>

<!-- load main logic + avatar loader -->
<script type="module">
  import './scripts.js';
  import { initAvatarForThread } from './AvatarThreadLoader.js';

  // scripts.js must dispatch ds-thread-loaded after it fetches the thread:
  // window.dispatchEvent(new CustomEvent('ds-thread-loaded', { detail: { thread: t } }));
  window.addEventListener('ds-thread-loaded', (e) => {
    const thread = e.detail.thread; // has .author and .content
    initAvatarForThread(thread);
  });
</script>
</body>
</html>
