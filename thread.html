<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Thread • Darkside</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <link href="styles.css" rel="stylesheet">

  <style>
    body {
      background: radial-gradient(circle at top, #151826 0, #05060a 55%);
    }

    /* ====== Thread header ====== */
    .thread-header-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    .thread-title-main {
      font-size: 1.15rem;
      font-weight: 600;
    }

    .thread-tag-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 3px 8px;
      border-radius: 999px;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      background: rgba(88, 101, 242, 0.16);
      color: #c3c7ff;
    }
    .thread-tag-pill i {
      font-size: 0.7rem;
    }

    .thread-meta-row {
      margin-top: 4px;
      font-size: 0.8rem;
      color: #9ca3c9;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .thread-meta-row .dot {
      width: 4px;
      height: 4px;
      border-radius: 999px;
      background: #4b5563;
    }

    .thread-stats {
      margin-top: 6px;
      font-size: 0.8rem;
      color: #9ca3c9;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .thread-stats span {
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }

    /* ====== Main layout ====== */
    .thread-layout {
      display: grid;
      grid-template-columns: 240px minmax(0, 1fr);
      gap: 18px;
    }

    /* ====== Author sidebar ====== */
    .thread-sidebar {
      border-right: 1px solid #181c2d;
      padding-right: 14px;
      font-size: 0.85rem;
      color: #9ca3c9;
    }

    .author-avatar-wrapper {
      margin-bottom: 10px;
    }
    .author-avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid #181c2d;
      box-shadow: 0 0 12px rgba(0,0,0,0.6);
    }

    .author-name {
      font-size: 1.05rem;
      font-weight: 600;
      margin-bottom: 4px;
      color: #e5e7ff;
    }

    .author-rank {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #ffd37a;
      margin-bottom: 8px;
    }

    .author-meta {
      margin-top: 8px;
      font-size: 0.8rem;
    }
    .author-meta div + div {
      margin-top: 2px;
    }

    /* ====== Main content box ====== */
    .thread-content-box {
      background: #05070d;
      border-radius: 8px;
      border: 1px solid #181c2d;
      padding: 14px 16px;
      box-shadow: 0 0 18px rgba(0,0,0,0.7);
    }

    .thread-post-body-main {
      font-size: 0.95rem;
      line-height: 1.6;
      white-space: pre-wrap;
    }

    /* Links inside post body – inherit color so [color]+[url] works */
    .post-body a,
    .post-body a:link,
    .post-body a:visited,
    .post-body a:hover,
    .post-body a:active {
      color: inherit;
      text-decoration: underline;
    }

    /* ====== Replies box ====== */
    .thread-replies-box {
      margin-top: 18px;
      background: #05070d;
      border-radius: 8px;
      border: 1px solid #181c2d;
      padding: 12px 14px;
    }

    .reply-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
      font-size: 0.9rem;
    }

    .reply-form textarea {
      width: 100%;
      background: #050811;
      border: 1px solid #181c2d;
      border-radius: 4px;
      padding: 8px 10px;
      min-height: 80px;
      resize: vertical;
      color: #f5f6ff;
      font-size: 0.9rem;
    }

    .reply-form textarea:focus {
      outline: none;
      border-color: #5865f2;
      box-shadow: 0 0 0 1px rgba(88, 101, 242, 0.5);
    }

    .reply-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 8px;
      font-size: 0.8rem;
    }

    .replies-list {
      margin-top: 14px;
      border-top: 1px solid #181c2d;
      padding-top: 10px;
      font-size: 0.9rem;
    }

    .reply-item {
      border-bottom: 1px solid #101321;
      padding: 8px 0;
    }

    .reply-meta {
      font-size: 0.78rem;
      color: #a0a4c0;
      margin-bottom: 4px;
    }

    .reply-body {
      white-space: pre-wrap;
    }

    /* ====== Like area ====== */
    .thread-like-area {
      margin-top: 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.85rem;
    }

    .btn-like {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border-radius: 3px;
      border: 1px solid #303856;
      background: #141826;
      cursor: pointer;
      font-size: 0.8rem;
      color: #cbd0ff;
    }

    .btn-like i {
      font-size: 0.8rem;
    }

    .btn-like.liked {
      border-color: #22c55e;
      background: rgba(34, 197, 94, 0.12);
      color: #bbf7d0;
    }

    /* ====== Video embed ====== */
    .thread-video-box {
      margin-top: 14px;
      background: #05070d;
      border-radius: 8px;
      border: 1px solid #181c2d;
      overflow: hidden;
      box-shadow: 0 0 18px rgba(0,0,0,0.7);
    }
    .thread-video-box iframe {
      width: 100%;
      aspect-ratio: 16/9;
      display: block;
      border: none;
    }
    .thread-video-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 14px;
      padding: 8px 14px;
      background: rgba(15, 23, 42, 0.8);
      border: 1px solid #181c2d;
      border-radius: 6px;
      color: #93c5fd;
      font-size: 0.85rem;
      text-decoration: none;
    }
    .thread-video-link:hover {
      color: #bfdbfe;
      border-color: #5865f2;
    }

    /* ====== Lock badge ====== */
    .thread-lock-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 12px;
      border-radius: 6px;
      background: rgba(239, 68, 68, 0.15);
      border: 1px solid rgba(239, 68, 68, 0.4);
      color: #f87171;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    /* ====== Thread actions ====== */
    .thread-actions {
      margin-top: 14px;
      display: flex;
      gap: 8px;
    }
    .thread-actions button {
      padding: 6px 12px;
      border-radius: 4px;
      border: 1px solid;
      background: rgba(15, 23, 42, 0.8);
      cursor: pointer;
      font-size: 0.8rem;
    }
    .btn-edit {
      border-color: rgba(99, 102, 241, 0.4);
      color: #a5b4fc;
    }
    .btn-edit:hover {
      background: rgba(99, 102, 241, 0.15);
    }
    .btn-lock {
      border-color: rgba(239, 68, 68, 0.4);
      color: #f87171;
    }
    .btn-lock:hover {
      background: rgba(239, 68, 68, 0.15);
    }
    .btn-unlock {
      border-color: rgba(34, 197, 94, 0.4);
      color: #4ade80;
    }
    .btn-unlock:hover {
      background: rgba(34, 197, 94, 0.15);
    }

    /* ====== Edit modal ====== */
    .edit-modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.8);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 10000;
    }
    .edit-modal {
      background: #0f172a;
      border: 1px solid #1e293b;
      border-radius: 8px;
      padding: 20px;
      width: 90%;
      max-width: 600px;
      max-height: 90vh;
      overflow-y: auto;
    }
    .edit-modal h3 {
      margin-top: 0;
      color: #e2e8f0;
    }
    .edit-modal label {
      display: block;
      margin-top: 12px;
      color: #94a3b8;
      font-size: 0.85rem;
    }
    .edit-modal input,
    .edit-modal textarea {
      width: 100%;
      background: #1e293b;
      border: 1px solid #334155;
      color: #e2e8f0;
      padding: 8px 12px;
      border-radius: 4px;
      margin-top: 4px;
    }
    .edit-modal textarea {
      min-height: 150px;
      resize: vertical;
    }
    .edit-modal-actions {
      margin-top: 16px;
      gap: 8px;
      justify-content: flex-end;
    }

    @media (max-width: 768px) {
      .thread-layout {
        grid-template-columns: 1fr;
      }
      .thread-sidebar {
        border-right: none;
        border-bottom: 1px solid #181c2d;
        padding-bottom: 10px;
        margin-bottom: 10px;
      }
    }
  </style>
<link href="notifications.css" rel="stylesheet">
</head>
<body>
<div id="page">
  <!-- HEADER -->
  <header id="header">
    <div class="wrapper header-inner">
      <div class="header-left">
        <div class="header-logo">
          <span class="logo-text">Darkside.ax</span>
          <span class="logo-slogan">Beyond the Limits</span>
        </div>
      </div>
      <div class="header-right">
<div class="auth-area">
          <div class="notif-wrapper">
            <button class="notif-bell-btn" id="notif-bell-btn" type="button" aria-label="Notifications">
              <i class="fa fa-bell" id="n-bell-icon"></i>
              <span class="notif-count" id="notif-count">0</span>
            </button>
            <div class="notif-dropdown" id="notif-dropdown">
              <div class="notif-dropdown-header">
                <span><i class="fa fa-bell"></i> Notifications</span>
                <span class="badge" id="notif-badge-count">0</span>
              </div>
              <button type="button" class="notif-clear-btn" id="notif-clear-btn">
                <i class="fa fa-check-double"></i> Mark all as read
              </button>
              <div class="notif-list" id="notif-list"></div>
            </div>
          </div>
          <div class="auth-links"></div>
        </div>
      </div>
    </div>
  </header>

  <!-- NAVBAR -->
  <nav id="navbar">
    <div class="wrapper navbar-inner">
      <ul class="nav-main">
        <li><a href="index.html"><i class="fa fa-home"></i> Home</a></li>
        <li><a href="accounts.html" class="active"><i class="fa fa-user-tag"></i> Accounts</a></li>
      </ul>
    </div>
  </nav>

  <!-- CONTENT -->
  <main id="container">
    <div class="wrapper">
      <section class="category">
        <header class="cat-header">
          <div class="thread-header-bar">
            <span id="thread-title-display" class="thread-title-main">Loading thread...</span>
            <div style="display:flex;align-items:center;gap:10px;">
              <span class="thread-lock-badge" id="thread-lock-badge" style="display:none;">
                <i class="fa fa-lock"></i> LOCKED
              </span>
              <span class="thread-tag-pill" id="thread-tag-pill" style="display:none;">
                <i class="fa fa-tag"></i><span id="thread-tag-text"></span>
              </span>
            </div>
          </div>
          <div class="thread-meta-row">
            <span id="thread-meta-display"></span>
            <span class="dot"></span>
            <span id="thread-created-at"></span>
          </div>
        </header>

        <!-- Video embed (shown if embed_url exists) -->
        <div class="thread-video-box" id="thread-video-box" style="display:none;">
          <iframe id="thread-video-iframe" src="" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
        </div>
        <a id="thread-video-link" class="thread-video-link" style="display:none;" target="_blank" rel="noopener">
          <i class="fa fa-external-link-alt"></i> <span id="thread-video-link-text">View Media</span>
        </a>

        <div class="cat-body card-panel">
          <div class="thread-layout">
            <!-- left: author info -->
            <aside class="thread-sidebar">
              <div class="author-avatar-wrapper">
                <img id="thread-avatar-img" class="author-avatar"
                     src="images/default-avatar.png" alt="Avatar">
              </div>
              <div class="author-name" id="thread-author-name">Author</div>
              <div class="author-rank" id="thread-author-rank">Member</div>
              <div class="author-meta">
                <div id="thread-author-extra"></div>
              </div>
            </aside>

            <!-- right: content + replies -->
            <div>
              <!-- main content box -->
              <article class="thread-content-box">
                <div id="thread-content-display"
                     class="thread-post-body-main post-body">
                  <!-- filled via scripts.js -->
                </div>
                <div class="thread-actions" id="thread-actions" style="display:none;">
                  <button class="btn-edit" id="btn-edit-thread">
                    <i class="fa fa-edit"></i> Edit
                  </button>
                  <button class="btn-lock" id="btn-lock-thread">
                    <i class="fa fa-lock"></i> Lock
                  </button>
                  <button class="btn-unlock" id="btn-unlock-thread" style="display:none;">
                    <i class="fa fa-unlock"></i> Unlock
                  </button>
                </div>
              </article>

              <!-- replies box -->
              <section class="thread-replies-box">
                <div class="reply-header">
                  <span><i class="fa fa-comments"></i> Replies</span>
                  <span id="reply-info-text">Login to leave a reply.</span>
                </div>

                <div id="reply-form-container">
                  <form id="reply-form" class="reply-form">
                    <textarea id="reply-text" placeholder="Write your reply..."></textarea>
                    <div class="reply-actions">
                      <span id="reply-status"></span>
                      <button type="submit" class="btn btn-primary btn-small" id="reply-submit">
                        <i class="fa fa-paper-plane"></i> Post Reply
                      </button>
                    </div>
                  </form>
                </div>
                <div id="reply-locked-message" style="display:none; color:#f87171; font-size:0.85rem; padding:8px 0;">
                  <i class="fa fa-lock"></i> This thread is locked. No new replies allowed.
                </div>

                <div class="thread-like-area">
                  <button class="btn-like" id="thread-like-btn">
                    <i class="fa fa-heart"></i>
                    <span id="thread-like-text">Like</span>
                  </button>
                  <span id="thread-like-count">0 likes</span>
                </div>

                <div class="replies-list" id="replies-list">
                  <div class="reply-item" id="replies-placeholder">
                    <div class="reply-meta">No replies yet. Be the first to drop one.</div>
                  </div>
                </div>
              </section>

              <!-- back link -->
              <div class="card-panel" style="margin-top:15px;">
                <a href="accounts.html"><i class="fa fa-arrow-left"></i> Back to Accounts</a>
              </div>
            </div>
          </div>
        </div>
      </section>
    </div>
  </main>
</div>

<!-- Edit Modal -->
<div class="edit-modal-overlay" id="edit-modal-overlay">
  <div class="edit-modal">
    <h3>Edit Thread</h3>
    <label for="edit-title">Title</label>
    <input type="text" id="edit-title">
    <label for="edit-content">Content</label>
    <textarea id="edit-content"></textarea>
    <div class="edit-modal-actions">
      <button type="button" id="btn-cancel-edit" style="background:#334155;color:#e2e8f0;border:none;padding:8px 16px;border-radius:4px;cursor:pointer;">Cancel</button>
      <button type="button" id="btn-save-edit" style="background:#6366f1;color:#fff;border:none;padding:8px 16px;border-radius:4px;cursor:pointer;">Save</button>
    </div>
  </div>
</div>

<!-- load main logic + avatar loader + replies -->
<script type="module" src="scripts.js"></script>
<script type="module" src="threadreplies.js"></script>
<script type="module">
  import { initAvatarForThread } from './AvatarThreadLoader.js';

  function getEmbedUrl(url) {
    if (!url) return null;
    // YouTube
    const ytMatch = url.match(/(?:youtube\.com\/(?:watch\?v=|embed\/)|youtu\.be\/)([\w-]{11})/);
    if (ytMatch) return `https://www.youtube.com/embed/${ytMatch[1]}`;
    if (url.includes('youtube.com/embed/')) return url;
    // Not embeddable – use as link
    return null;
  }

  window.addEventListener('ds-thread-loaded', (e) => {
    const thread = e.detail.thread;
    initAvatarForThread(thread);

    // Lock badge
    if (thread.is_locked) {
      const lockBadge = document.getElementById('thread-lock-badge');
      if (lockBadge) lockBadge.style.display = 'inline-flex';
    }

    // Hide reply form if locked
    if (thread.is_locked) {
      const replyFormContainer = document.getElementById('reply-form-container');
      const replyLockedMessage = document.getElementById('reply-locked-message');
      if (replyFormContainer) replyFormContainer.style.display = 'none';
      if (replyLockedMessage) replyLockedMessage.style.display = 'block';
    }

    // Video embed
    if (thread.embed_url) {
      const embedUrl = getEmbedUrl(thread.embed_url);
      if (embedUrl) {
        const videoBox = document.getElementById('thread-video-box');
        const videoIframe = document.getElementById('thread-video-iframe');
        if (videoBox && videoIframe) {
          videoIframe.src = embedUrl;
          videoBox.style.display = 'block';
        }
      } else {
        // Non-YouTube URL – show as clickable link
        const videoLink = document.getElementById('thread-video-link');
        const videoLinkText = document.getElementById('thread-video-link-text');
        if (videoLink && videoLinkText) {
          videoLink.href = thread.embed_url;
          videoLinkText.textContent = thread.embed_url;
          videoLink.style.display = 'inline-flex';
        }
      }
    }

    // Show action buttons based on permissions
    (async () => {
      const user = await window.getCurrentUserWithRole?.();
      if (!user) return;

      const role = (user.role || '').toLowerCase();
      const isAdminOrOwner = role === 'admin' || role === 'owner';
      const isAuthor = user.username === thread.author;

      const actionsDiv = document.getElementById('thread-actions');
      const editBtn = document.getElementById('btn-edit-thread');
      const lockBtn = document.getElementById('btn-lock-thread');
      const unlockBtn = document.getElementById('btn-unlock-thread');

      if (!actionsDiv) return;

      // Edit button: author or admin/owner
      if (isAuthor || isAdminOrOwner) {
        if (editBtn) editBtn.style.display = 'inline-block';
      }

      // Lock/Unlock buttons: admin/owner only
      if (isAdminOrOwner) {
        if (thread.is_locked) {
          if (unlockBtn) unlockBtn.style.display = 'inline-block';
        } else {
          if (lockBtn) lockBtn.style.display = 'inline-block';
        }
      }

      if (actionsDiv.querySelectorAll('button[style*="display:inline-block"]').length > 0) {
        actionsDiv.style.display = 'flex';
      }
    })();
  });

  // Edit modal logic
  const editModalOverlay = document.getElementById('edit-modal-overlay');
  const editTitleInput = document.getElementById('edit-title');
  const editContentInput = document.getElementById('edit-content');
  const cancelEditBtn = document.getElementById('btn-cancel-edit');
  const saveEditBtn = document.getElementById('btn-save-edit');
  const editBtn = document.getElementById('btn-edit-thread');
  const lockBtn = document.getElementById('btn-lock-thread');
  const unlockBtn = document.getElementById('btn-unlock-thread');

  let currentThreadId = null;

  if (editBtn) {
    editBtn.addEventListener('click', async () => {
      const urlParams = new URLSearchParams(window.location.search);
      currentThreadId = urlParams.get('id');
      if (!currentThreadId) return;

      // Load current thread data
      try {
        const resp = await fetch(`/api/get-thread?id=${currentThreadId}`);
        const json = await resp.json();
        if (json.success && json.thread) {
          editTitleInput.value = json.thread.title || '';
          editContentInput.value = json.thread.content || '';
          editModalOverlay.style.display = 'flex';
        }
      } catch (err) {
        console.error('Failed to load thread for edit:', err);
      }
    });
  }

  if (cancelEditBtn) {
    cancelEditBtn.addEventListener('click', () => {
      editModalOverlay.style.display = 'none';
    });
  }

  if (saveEditBtn) {
    saveEditBtn.addEventListener('click', async () => {
      if (!currentThreadId) return;
      try {
        const { data: sessionData } = await window.supabaseClient.auth.getSession();
        const token = sessionData?.session?.access_token;
        if (!token) { alert('No token, please re-login.'); return; }

        const resp = await fetch('/api/update-thread', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
          body: JSON.stringify({
            id: currentThreadId,
            title: editTitleInput.value.trim(),
            content: editContentInput.value.trim(),
          }),
        });
        const json = await resp.json();
        if (!resp.ok || !json.success) {
          throw new Error(json.error || 'Failed to update thread');
        }
        editModalOverlay.style.display = 'none';
        window.location.reload();
      } catch (err) {
        alert('Failed to update thread: ' + err.message);
      }
    });
  }

  // Lock/Unlock logic
  if (lockBtn) {
    lockBtn.addEventListener('click', async () => {
      const urlParams = new URLSearchParams(window.location.search);
      const threadId = urlParams.get('id');
      if (!threadId) return;
      try {
        const { data: sessionData } = await window.supabaseClient.auth.getSession();
        const token = sessionData?.session?.access_token;
        if (!token) { alert('No token, please re-login.'); return; }
        const resp = await fetch('/api/toggle-thread-lock', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
          body: JSON.stringify({ id: threadId, is_locked: true }),
        });
        const json = await resp.json();
        if (!resp.ok || !json.success) {
          throw new Error(json.error || 'Failed to lock thread');
        }
        window.location.reload();
      } catch (err) {
        alert('Failed to lock thread: ' + err.message);
      }
    });
  }

  if (unlockBtn) {
    unlockBtn.addEventListener('click', async () => {
      const urlParams = new URLSearchParams(window.location.search);
      const threadId = urlParams.get('id');
      if (!threadId) return;
      try {
        const { data: sessionData } = await window.supabaseClient.auth.getSession();
        const token = sessionData?.session?.access_token;
        if (!token) { alert('No token, please re-login.'); return; }
        const resp = await fetch('/api/toggle-thread-lock', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
          body: JSON.stringify({ id: threadId, is_locked: false }),
        });
        const json = await resp.json();
        if (!resp.ok || !json.success) {
          throw new Error(json.error || 'Failed to unlock thread');
        }
        window.location.reload();
      } catch (err) {
        alert('Failed to unlock thread: ' + err.message);
      }
    });
  }
</script>
