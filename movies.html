<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Movies & Series • Darkside</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <link href="styles.css" rel="stylesheet">
  <link href="notifications.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      background: #141414;
      margin: 0;
      padding: 0;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* Netflix-style header */
    #header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1000;
      background: linear-gradient(to bottom, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0) 100%);
      transition: background 0.3s;
    }
    #header.scrolled {
      background: #141414;
    }

    .header-inner {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 4%;
      height: 68px;
      gap: 20px;
    }

    .header-logo .logo-text {
      color: #e50914;
      font-size: 26px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 3px;
      animation: rainbowText 6s linear infinite;
    }
    .header-logo .logo-slogan {
      display: none;
    }

    @keyframes rainbowText {
      0% { color: #ff0000; }
      16.66% { color: #ff8000; }
      33.33% { color: #ffff00; }
      50% { color: #00ff00; }
      66.66% { color: #0080ff; }
      83.33% { color: #8000ff; }
      100% { color: #ff0000; }
    }

    /* Netflix navbar */
    #navbar {
      position: fixed;
      top: 68px;
      left: 0;
      right: 0;
      z-index: 999;
      background: linear-gradient(to bottom, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0) 100%);
      transition: background 0.3s;
    }
    #navbar.scrolled {
      background: #141414;
    }

    .navbar-inner {
      padding: 0 4%;
    }

    .nav-main {
      display: flex;
      list-style: none;
      margin: 0;
      padding: 0;
      gap: 8px;
    }

    .nav-main a {
      color: #e5e5e5;
      text-decoration: none;
      font-size: 15px;
      font-weight: 500;
      padding: 10px 20px;
      border-radius: 6px;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      gap: 8px;
      border: 1px solid transparent;
      letter-spacing: 0.3px;
    }
    .nav-main a:hover {
      color: #fff;
      background: #1a1a1a;
      border-color: #333;
    }
    .nav-main a.active {
      color: #fff;
      font-weight: 600;
      background: #e50914;
      border-color: #e50914;
    }
    .nav-main a i {
      font-size: 16px;
    }

    /* Header search box */
    .header-search {
      display: flex;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 4px;
      overflow: hidden;
      transition: border-color 0.3s;
    }

    .header-search:focus-within {
      border-color: #e50914;
    }

    .header-search input {
      background: transparent;
      border: none;
      color: #fff;
      padding: 8px 12px;
      font-size: 14px;
      width: 200px;
      outline: none;
    }
    .header-search input::placeholder {
      color: #666;
    }

    .header-search button {
      background: transparent;
      border: none;
      color: #888;
      padding: 8px 12px;
      cursor: pointer;
      transition: color 0.2s;
    }
    .header-search button:hover {
      color: #e50914;
    }

    .auth-area {
      display: flex;
      align-items: center;
    }
    .auth-links {
      display: flex;
      align-items: center;
    }

    /* Main content area */
    .content-wrapper {
      padding: 20px 4%;
    }

    /* Search section (for results page) */
    .search-section {
      padding: 40px 4%;
    }

    .search-bar {
      display: flex;
      max-width: 600px;
      background: #141414;
      border: 2px solid #333;
      border-radius: 4px;
      overflow: hidden;
      margin: 0 auto;
    }

    .search-bar input {
      flex: 1;
      background: #141414;
      border: none;
      color: #fff;
      padding: 16px 20px;
      font-size: 16px;
      font-weight: 400;
      outline: none;
      letter-spacing: 0.3px;
      font-family: 'Inter', sans-serif;
    }
    .search-bar input::placeholder {
      color: #666;
      font-weight: 400;
    }

    .search-bar button {
      background: #e50914;
      border: none;
      color: #fff;
      padding: 16px 32px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      letter-spacing: 0.3px;
    }
    .search-bar button:hover {
      background: #f40612;
    }
    .search-bar button:disabled {
      background: #555;
      cursor: not-allowed;
    }

    /* Results count */
    .results-count {
      color: #888;
      font-size: 14px;
      margin-bottom: 16px;
      padding: 0 4%;
    }

    /* Netflix-style rows */
    .netflix-row {
      margin-bottom: 40px;
      padding: 0 4%;
    }

    .row-slider {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      padding-bottom: 20px;
      scroll-behavior: smooth;
      -webkit-overflow-scrolling: touch;
    }

    .row-slider::-webkit-scrollbar {
      height: 8px;
    }
    .row-slider::-webkit-scrollbar-track {
      background: transparent;
    }
    .row-slider::-webkit-scrollbar-thumb {
      background: #555;
      border-radius: 4px;
    }
    .row-slider::-webkit-scrollbar-thumb:hover {
      background: #777;
    }

    /* Netflix-style cards */
    .movie-card {
      flex: 0 0 auto;
      width: 200px;
      cursor: pointer;
      transition: transform 0.3s, z-index 0.3s;
      position: relative;
      border-radius: 4px;
      overflow: hidden;
    }

    .movie-card:hover {
      transform: scale(1.1);
      z-index: 10;
    }

    .movie-card-poster {
      width: 100%;
      aspect-ratio: 2/3;
      background: #141414;
      position: relative;
      overflow: hidden;
    }

    .movie-card-poster img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .movie-card-poster .poster-placeholder {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #333;
      font-size: 48px;
      background: #141414;
    }

    /* Badge */
    .movie-card-badge {
      position: absolute;
      top: 8px;
      left: 8px;
      padding: 4px 8px;
      border-radius: 2px;
      font-size: 11px;
      font-weight: bold;
      text-transform: uppercase;
    }
    .badge-movie {
      background: #e50914;
      color: #fff;
    }
    .badge-series {
      background: #0071eb;
      color: #fff;
    }
    .badge-other {
      background: #666;
      color: #fff;
    }

    /* Hover overlay */
    .movie-card .card-overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, transparent 100%);
      padding: 60px 12px 12px;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .movie-card:hover .card-overlay {
      opacity: 1;
    }

    .card-overlay-title {
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      letter-spacing: 0.3px;
    }

    .card-overlay-meta {
      color: #aaa;
      font-size: 13px;
      margin-bottom: 8px;
      font-weight: 400;
    }

    .card-overlay-play {
      background: #fff;
      color: #000;
      border: none;
      padding: 8px 16px;
      font-size: 14px;
      font-weight: 600;
      border-radius: 4px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: background 0.2s;
      letter-spacing: 0.3px;
    }
    .card-overlay-play:hover {
      background: rgba(255,255,255,0.75);
    }

    /* Loading */
    .movies-loading {
      text-align: center;
      padding: 60px 0;
      color: #888;
    }
    .movies-loading i {
      font-size: 32px;
      margin-bottom: 12px;
    }

    /* Empty state */
    .movies-empty {
      text-align: center;
      padding: 80px 0;
      color: #666;
    }
    .movies-empty i {
      font-size: 64px;
      margin-bottom: 16px;
      color: #444;
    }
    .movies-empty p {
      font-size: 16px;
      font-weight: 400;
      color: #666;
    }

    /* Main container */
    #container {
      padding-top: 68px;
    }

    /* Footer */
    .index-bottom {
      padding: 40px 4%;
      text-align: center;
      color: #888;
      font-size: 14px;
      font-weight: 400;
    }
    .index-links a {
      color: #888;
      text-decoration: none;
      margin: 0 8px;
    }
    .index-links a:hover {
      color: #fff;
    }
    .copyright {
      margin-top: 16px;
    }

    /* Animations */
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    .fade-in {
      animation: fadeIn 0.5s ease-out;
    }

    /* Notification dropdown - Netflix style */
    .notif-dropdown {
      background: #141414;
      border: 1px solid #333;
    }
    .notif-dropdown-header {
      background: #1a1a1a;
      border-bottom: 1px solid #333;
    }
    .notif-item {
      border-bottom: 1px solid #333;
    }
    .notif-item:hover {
      background: #1a1a1a;
    }

    .notif-bell-btn {
      background: transparent;
      border: none;
      color: #fff;
    }
    .notif-bell-btn:hover {
      color: #e50914;
    }

    /* Continue Watching progress bar */
    .card-progress-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: rgba(255,255,255,0.15);
      z-index: 5;
    }
    .card-progress-fill {
      height: 100%;
      background: #e50914;
      border-radius: 0 2px 2px 0;
      transition: width 0.3s;
    }

    /* Row slider arrows */
    .netflix-row {
      position: relative;
    }
    .row-header-wrap {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .row-header {
      font-size: 22px;
      font-weight: 700;
      color: #e5e5e5;
      letter-spacing: 0.5px;
    }
    .row-see-all {
      font-size: 13px;
      color: #888;
      text-decoration: none;
      font-weight: 500;
      cursor: pointer;
      transition: color 0.2s;
      background: none;
      border: none;
      font-family: inherit;
    }
    .row-see-all:hover {
      color: #e50914;
    }
    .slider-wrapper {
      position: relative;
    }
    .slider-arrow {
      position: absolute;
      top: 0;
      bottom: 20px;
      width: 50px;
      z-index: 10;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      color: #fff;
      transition: background 0.2s, opacity 0.2s;
      opacity: 0;
      background: rgba(0,0,0,0.5);
    }
    .slider-wrapper:hover .slider-arrow {
      opacity: 1;
    }
    .slider-arrow:hover {
      background: rgba(0,0,0,0.8);
    }
    .slider-arrow-left {
      left: 0;
      border-radius: 0 4px 4px 0;
    }
    .slider-arrow-right {
      right: 0;
      border-radius: 4px 0 0 4px;
    }

    /* Browse Movies section */
    .browse-section {
      margin-top: 40px;
      padding: 0 4%;
    }
    .browse-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }
    .browse-title {
      font-size: 26px;
      font-weight: 700;
      color: #e5e5e5;
    }
    .browse-count {
      font-size: 14px;
      color: #888;
      font-weight: 400;
    }
    .browse-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 16px;
    }
    .browse-card {
      cursor: pointer;
      transition: transform 0.3s;
      border-radius: 6px;
      overflow: hidden;
      position: relative;
    }
    .browse-card:hover {
      transform: scale(1.05);
      z-index: 10;
    }
    .browse-card-poster {
      width: 100%;
      aspect-ratio: 2/3;
      background: #1a1a1a;
      position: relative;
      overflow: hidden;
      border-radius: 6px;
    }
    .browse-card-poster img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .browse-card-poster .poster-placeholder {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #333;
      font-size: 36px;
      background: #141414;
    }
    .browse-card-overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, transparent 100%);
      padding: 40px 10px 10px;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .browse-card:hover .browse-card-overlay {
      opacity: 1;
    }
    .browse-card-title {
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .browse-card-meta {
      color: #aaa;
      font-size: 11px;
      margin-top: 2px;
    }
    .browse-card-badge {
      position: absolute;
      top: 6px;
      left: 6px;
      padding: 2px 6px;
      border-radius: 2px;
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
    }

    /* Show All Movies button */
    .show-all-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 18px;
      border-radius: 6px;
      border: 1px solid #e50914;
      background: linear-gradient(135deg, rgba(229,9,20,0.15) 0%, rgba(229,9,20,0.05) 100%);
      color: #e50914;
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      transition: all 0.3s ease;
      letter-spacing: 0.3px;
      position: relative;
      overflow: hidden;
      white-space: nowrap;
    }
    .show-all-btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(229,9,20,0.2), transparent);
      transition: left 0.5s ease;
    }
    .show-all-btn:hover::before {
      left: 100%;
    }
    .show-all-btn:hover {
      background: linear-gradient(135deg, rgba(229,9,20,0.3) 0%, rgba(229,9,20,0.1) 100%);
      color: #fff;
      border-color: #f40612;
      box-shadow: 0 0 20px rgba(229,9,20,0.3), 0 0 40px rgba(229,9,20,0.1);
      transform: translateY(-1px);
    }
    .show-all-btn:active {
      transform: translateY(0);
    }
    .show-all-btn i {
      font-size: 15px;
    }
  </style>
</head>
<body>

<div id="page">
  <!-- HEADER -->
  <header id="header">
    <div class="wrapper header-inner">
      <div class="header-left">
        <div class="header-logo">
          <span class="logo-text">Darkside</span>
          <span class="logo-slogan">Beyond the Limits</span>
        </div>
      </div>
      <div class="header-right">
        <div class="header-search">
          <input type="text" id="header-search-input" placeholder="Search movies..." autocomplete="off">
          <button id="header-search-btn"><i class="fa fa-search"></i></button>
        </div>
        <a href="allmovies.html" class="show-all-btn">
          <i class="fa fa-film"></i> All Movies
        </a>
        <div class="auth-area">
          <div class="auth-links"></div>
        </div>
      </div>
    </div>
  </header>

  <!-- NAVBAR -->
  <nav id="navbar">
    <div class="wrapper navbar-inner">
      <ul class="nav-main">
        <li><a href="index.html"><i class="fa fa-home"></i> Home</a></li>
        <li><a href="movies.html"><i class="fa fa-film"></i> Movies</a></li>
      </ul>
    </div>
  </nav>

  <!-- CONTENT -->
  <main id="container">
    <div class="wrapper content-column">
      <div class="content-wrapper">
        <div class="results-count" id="results-count"></div>
        <div id="movies-results">
          <!-- Categories will be injected here -->
          <div class="movies-loading">
            <i class="fa fa-spinner fa-spin"></i>
            <p>Loading movies...</p>
          </div>
        </div>
      </div>

      <!-- FOOTER -->
      <footer class="index-bottom" style="margin-top: 40px;">
        <div class="index-links">
          <a href="#">Mark all threads read</a> ·
          <a href="#">Forum Team</a> ·
          <a href="#">Contact</a>
        </div>
        <div class="copyright">
          &copy; 2026 Darkside. Theme inspired by dark community forums.
        </div>
      </footer>

    </div>
  </main>
</div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script src="auth.js"></script>
  <script src="notifications.js"></script>
  <script>
// movies.js — inlined

const headerSearchInput = document.getElementById('header-search-input');
const headerSearchBtn = document.getElementById('header-search-btn');
const resultsContainer = document.getElementById('movies-results');
const resultsCount = document.getElementById('results-count');
const header = document.getElementById('header');
const navbar = document.getElementById('navbar');

let isSearching = false;

// Continue Watching - localStorage tracking
function getContinueWatching() {
  try {
    return JSON.parse(localStorage.getItem('continueWatching') || '[]');
  } catch(e) { return []; }
}

function saveContinueWatching(item) {
  if (!item.href) return;
  let list = getContinueWatching();
  // Remove duplicate
  list = list.filter(i => i.href !== item.href);
  // Add to front
  list.unshift({
    href: item.href,
    title: item.title || '',
    image_url: item.image_url || '',
    bg_url: item.bg_url || '',
    type: item.type || '',
    year: item.year || '',
    embed: item.embed || '',
    description: item.description || '',
    timestamp: Date.now(),
  });
  // Keep max 20
  list = list.slice(0, 20);
  localStorage.setItem('continueWatching', JSON.stringify(list));
}

function displayContinueWatching() {
  const list = getContinueWatching();
  if (list.length === 0) return;

  const row = document.createElement('div');
  row.className = 'netflix-row fade-in';

  const header = document.createElement('div');
  header.className = 'row-header';
  header.innerHTML = 'Continue Watching <span style="font-size:13px;color:#888;font-weight:400;margin-left:8px;">Pick up where you left off</span>';
  row.appendChild(header);

  const slider = document.createElement('div');
  slider.className = 'row-slider';

  list.forEach((item) => {
    const card = document.createElement('div');
    card.className = 'movie-card';

    let badgeClass = 'badge-other';
    let badgeText = item.type || '';
    if (item.type && item.type.toLowerCase() === 'movie') badgeClass = 'badge-movie';
    else if (item.type && item.type.toLowerCase() === 'series') badgeClass = 'badge-series';

    const metaParts = [];
    if (item.year) metaParts.push(item.year);
    if (item.type) metaParts.push(item.type);
    const metaText = metaParts.join(' · ');

    card.innerHTML = `
      <div class="movie-card-poster">
        ${item.image_url
          ? `<img src="${escapeHtml(item.image_url)}" alt="${escapeHtml(item.title)}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">
             <div class="poster-placeholder" style="display:none;"><i class="fa fa-film"></i></div>`
          : `<div class="poster-placeholder"><i class="fa fa-film"></i></div>`
        }
        ${badgeText ? `<span class="movie-card-badge ${badgeClass}">${escapeHtml(badgeText)}</span>` : ''}
        <div class="card-progress-bar"><div class="card-progress-fill" style="width:${Math.min(Math.random() * 60 + 10, 80)}%"></div></div>
        <div class="card-overlay">
          <div class="card-overlay-title" title="${escapeHtml(item.title)}">${escapeHtml(item.title)}</div>
          ${metaText ? `<div class="card-overlay-meta">${escapeHtml(metaText)}</div>` : ''}
          <button class="card-overlay-play" data-href="${escapeHtml(item.href)}" data-title="${escapeHtml(item.title)}">
            <i class="fa fa-play"></i> Resume
          </button>
        </div>
      </div>
    `;

    const playBtn = card.querySelector('.card-overlay-play');
    const openStream = async () => {
      saveContinueWatching(item);
      try {
        const resp = await fetch('/api/credits', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: 'movie_play', href: item.href }),
        });
        const data = await resp.json();
        if (data.success && data.embed_url) {
          window.location.href = data.embed_url;
          return;
        }
      } catch (e) {}
      window.location.href = `https://streamimdb.ru${item.href}`;
    };

    playBtn.addEventListener('click', (e) => { e.stopPropagation(); openStream(); });
    card.addEventListener('click', openStream);

    slider.appendChild(card);
  });

  row.appendChild(slider);
  resultsContainer.insertBefore(row, resultsContainer.firstChild);
}

// Fetch homepage categories on load
fetchHomepageCategories();

// Scroll effect for header
window.addEventListener('scroll', () => {
  if (window.scrollY > 50) {
    header.classList.add('scrolled');
    navbar.classList.add('scrolled');
  } else {
    header.classList.remove('scrolled');
    navbar.classList.remove('scrolled');
  }
});

headerSearchBtn.addEventListener('click', performSearch);
headerSearchInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') performSearch();
});

async function performSearch() {
  const query = headerSearchInput.value.trim();
  if (!query || isSearching) return;

  isSearching = true;
  headerSearchBtn.disabled = true;
  headerSearchBtn.innerHTML = '<i class="fa fa-spinner fa-spin"></i>';

  resultsContainer.innerHTML = `
    <div class="movies-loading">
      <i class="fa fa-spinner fa-spin"></i>
      Searching for "${escapeHtml(query)}"...
    </div>`;
  resultsCount.textContent = '';

  try {
    const resp = await fetch('/api/credits', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'movie_search', query }),
    });
    const data = await resp.json();
    if (!resp.ok || !data.success) throw new Error(data.error || 'Search failed');
    displayResults(data);
  } catch (err) {
    resultsContainer.innerHTML = `
      <div class="movies-empty">
        <i class="fa fa-exclamation-triangle"></i>
        <p>Search failed: ${escapeHtml(err.message)}</p>
      </div>`;
  } finally {
    isSearching = false;
    headerSearchBtn.disabled = false;
    headerSearchBtn.innerHTML = '<i class="fa fa-search"></i>';
  }
}

async function fetchHomepageCategories() {
  try {
    const resp = await fetch('/api/credits', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'movie_fetch_homepage' }),
    });
    const data = await resp.json();
    if (!resp.ok || !data.success) throw new Error(data.error || 'Failed to fetch categories');
    displayCategories(data.categories);
  } catch (err) {
    console.error('Failed to fetch homepage:', err);
    resultsContainer.innerHTML = `
      <div class="movies-empty">
        <i class="fa fa-exclamation-triangle"></i>
        <p>Failed to load movies. Please try again.</p>
      </div>`;
  }
}

function displayCategories(categories) {
  resultsContainer.innerHTML = '';

  // Show Continue Watching at the very top
  displayContinueWatching();

  const categoryTitles = {
    hero: 'Featured',
    top10: 'TOP 10',
    trending: 'Trending Today',
    popular: 'Popular Now',
    latest_episodes: 'Latest Episodes',
    latest: 'Latest TV Shows',
    top_rated: 'Top Rated',
    more: 'More to Explore',
    popular_movies: 'Popular Movies',
    popular_series: 'Popular Series',
    all: 'Popular Movies & Series'
  };

  console.log('Categories received:', categories);

  Object.keys(categories).forEach(key => {
    const items = categories[key];
    if (!items || items.length === 0) return;
    // Skip the Featured (hero) category - images don't extract correctly
    if (key === 'hero') return;

    console.log(`Displaying ${key} with ${items.length} items`);

    const row = document.createElement('div');
    row.className = 'netflix-row fade-in';

    const headerWrap = document.createElement('div');
    headerWrap.className = 'row-header-wrap';

    const headerEl = document.createElement('div');
    headerEl.className = 'row-header';
    headerEl.textContent = categoryTitles[key] || key;
    headerWrap.appendChild(headerEl);


    row.appendChild(headerWrap);

    const sliderWrapper = document.createElement('div');
    sliderWrapper.className = 'slider-wrapper';

    const leftArrow = document.createElement('button');
    leftArrow.className = 'slider-arrow slider-arrow-left';
    leftArrow.innerHTML = '<i class="fa fa-chevron-left"></i>';
    leftArrow.type = 'button';

    const rightArrow = document.createElement('button');
    rightArrow.className = 'slider-arrow slider-arrow-right';
    rightArrow.innerHTML = '<i class="fa fa-chevron-right"></i>';
    rightArrow.type = 'button';

    const slider = document.createElement('div');
    slider.className = 'row-slider';

    items.forEach((item) => {
      const card = document.createElement('div');
      card.className = 'movie-card';

      let badgeClass = 'badge-other';
      let badgeText = item.type || '';
      if (item.type && item.type.toLowerCase() === 'movie') badgeClass = 'badge-movie';
      else if (item.type && item.type.toLowerCase() === 'series') badgeClass = 'badge-series';

      const metaParts = [];
      if (item.year) metaParts.push(item.year);
      if (item.type) metaParts.push(item.type);
      const metaText = metaParts.join(' · ');

      card.innerHTML = `
        <div class="movie-card-poster">
          ${item.image_url
            ? `<img src="${escapeHtml(item.image_url)}" alt="${escapeHtml(item.title)}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">
               <div class="poster-placeholder" style="display:none;"><i class="fa fa-film"></i></div>`
            : `<div class="poster-placeholder"><i class="fa fa-film"></i></div>`
          }
          ${badgeText ? `<span class="movie-card-badge ${badgeClass}">${escapeHtml(badgeText)}</span>` : ''}
          <div class="card-overlay">
            <div class="card-overlay-title" title="${escapeHtml(item.title)}">${escapeHtml(item.title)}</div>
            ${metaText ? `<div class="card-overlay-meta">${escapeHtml(metaText)}</div>` : ''}
            <button class="card-overlay-play" data-href="${escapeHtml(item.href)}" data-title="${escapeHtml(item.title)}">
              <i class="fa fa-play"></i> Play
            </button>
          </div>
        </div>
      `;

      const playBtn = card.querySelector('.card-overlay-play');
      const openStream = async () => {
        saveContinueWatching(item);
        try {
          const resp = await fetch('/api/credits', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action: 'movie_play', href: item.href }),
          });
          const data = await resp.json();
          if (data.success && data.embed_url) {
            window.location.href = data.embed_url;
            return;
          }
        } catch (e) {}
        window.location.href = `https://streamimdb.ru${item.href}`;
      };

      playBtn.addEventListener('click', (e) => { e.stopPropagation(); openStream(); });
      card.addEventListener('click', openStream);

      slider.appendChild(card);
    });

    // Wire up arrows
    const scrollAmount = 800;
    leftArrow.addEventListener('click', () => {
      slider.scrollBy({ left: -scrollAmount, behavior: 'smooth' });
    });
    rightArrow.addEventListener('click', () => {
      slider.scrollBy({ left: scrollAmount, behavior: 'smooth' });
    });

    sliderWrapper.appendChild(leftArrow);
    sliderWrapper.appendChild(slider);
    sliderWrapper.appendChild(rightArrow);
    row.appendChild(sliderWrapper);
    resultsContainer.appendChild(row);
  });

  if (Object.keys(categories).length === 0 || resultsContainer.children.length === 0) {
    resultsContainer.innerHTML = `
      <div class="movies-empty">
        <i class="fa fa-film"></i>
        <p>No movies available right now. Try searching!</p>
      </div>`;
  }
}

function displayResults(data) {
  const countText = data.count_text || '';
  const results = data.results || [];

  if (countText) {
    resultsCount.textContent = countText;
  } else if (results.length > 0) {
    resultsCount.textContent = `Found ${results.length} results`;
  } else {
    resultsCount.textContent = '';
  }

  if (results.length === 0) {
    resultsContainer.innerHTML = `
      <div class="movies-empty">
        <i class="fa fa-search"></i>
        <p>${countText || 'No results found. Try a different search term.'}</p>
      </div>`;
    return;
  }

  const row = document.createElement('div');
  row.className = 'netflix-row fade-in';

  const header = document.createElement('div');
  header.className = 'row-header';
  header.textContent = 'Search Results';
  row.appendChild(header);

  const slider = document.createElement('div');
  slider.className = 'row-slider';

  results.forEach((item, idx) => {
    const card = document.createElement('div');
    card.className = 'movie-card';

    let badgeClass = 'badge-other';
    let badgeText = item.type || '';
    if (item.type && item.type.toLowerCase() === 'movie') badgeClass = 'badge-movie';
    else if (item.type && item.type.toLowerCase() === 'series') badgeClass = 'badge-series';

    const metaParts = [];
    if (item.year) metaParts.push(item.year);
    if (item.type) metaParts.push(item.type);
    const metaText = metaParts.join(' · ');

    card.innerHTML = `
      <div class="movie-card-poster">
        ${item.image_url
          ? `<img src="${escapeHtml(item.image_url)}" alt="${escapeHtml(item.title)}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">
             <div class="poster-placeholder" style="display:none;"><i class="fa fa-film"></i></div>`
          : `<div class="poster-placeholder"><i class="fa fa-film"></i></div>`
        }
        ${badgeText ? `<span class="movie-card-badge ${badgeClass}">${escapeHtml(badgeText)}</span>` : ''}
        <div class="card-overlay">
          <div class="card-overlay-title" title="${escapeHtml(item.title)}">${escapeHtml(item.title)}</div>
          ${metaText ? `<div class="card-overlay-meta">${escapeHtml(metaText)}</div>` : ''}
          <button class="card-overlay-play" data-href="${escapeHtml(item.href)}" data-title="${escapeHtml(item.title)}">
            <i class="fa fa-play"></i> Play
          </button>
        </div>
      </div>
    `;

    const playBtn = card.querySelector('.card-overlay-play');
    const openStream = async () => {
      saveContinueWatching(item);
      try {
        const resp = await fetch('/api/credits', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: 'movie_play', href: item.href }),
        });
        const data = await resp.json();
        if (data.success && data.embed_url) {
          window.location.href = data.embed_url;
          return;
        }
      } catch (e) {}
      window.location.href = `https://streamimdb.ru${item.href}`;
    };

    playBtn.addEventListener('click', (e) => { e.stopPropagation(); openStream(); });
    card.addEventListener('click', openStream);

    slider.appendChild(card);
  });

  row.appendChild(slider);
  resultsContainer.innerHTML = '';
  resultsContainer.appendChild(row);
}


function escapeHtml(str) {
  if (!str) return '';
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}
