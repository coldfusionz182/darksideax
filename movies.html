<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Movies & Series • Darkside</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <link href="styles.css" rel="stylesheet">
  <link href="notifications.css" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      background: #141414;
      margin: 0;
      padding: 0;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    }

    /* Netflix-style header */
    #header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1000;
      background: linear-gradient(to bottom, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0) 100%);
      transition: background 0.3s;
    }
    #header.scrolled {
      background: #141414;
    }

    .header-inner {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 4%;
      height: 68px;
    }

    .header-logo .logo-text {
      color: #e50914;
      font-size: 28px;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 2px;
    }
    .header-logo .logo-slogan {
      display: none;
    }

    /* Netflix navbar */
    #navbar {
      position: fixed;
      top: 68px;
      left: 0;
      right: 0;
      z-index: 999;
      background: linear-gradient(to bottom, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0) 100%);
      transition: background 0.3s;
    }
    #navbar.scrolled {
      background: #141414;
    }

    .navbar-inner {
      padding: 0 4%;
    }

    .nav-main {
      display: flex;
      list-style: none;
      margin: 0;
      padding: 0;
      gap: 20px;
    }

    .nav-main a {
      color: #e5e5e5;
      text-decoration: none;
      font-size: 14px;
      transition: color 0.3s;
    }
    .nav-main a:hover {
      color: #b3b3b3;
    }
    .nav-main a.active {
      color: #fff;
      font-weight: bold;
    }

    /* Hero banner - Netflix style */
    .hero-banner {
      position: relative;
      height: calc(100vh - 68px);
      background: #141414;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 0 4%;
      margin-top: 68px;
    }

    .hero-content {
      max-width: 800px;
      width: 100%;
      text-align: center;
      z-index: 2;
    }

    .hero-title {
      font-size: 64px;
      font-weight: bold;
      color: #e50914;
      margin: 0 0 40px 0;
      line-height: 1.1;
      text-transform: uppercase;
      letter-spacing: 4px;
    }

    .hero-search-container {
      width: 100%;
      max-width: 600px;
      margin: 0 auto;
    }

    .hero-search-box {
      display: flex;
      background: rgba(255,255,255,0.1);
      border: 2px solid #333;
      border-radius: 4px;
      overflow: hidden;
      transition: border-color 0.3s, background 0.3s;
    }

    .hero-search-box:focus-within {
      border-color: #e50914;
      background: rgba(255,255,255,0.15);
    }

    .hero-search-box input {
      flex: 1;
      background: transparent;
      border: none;
      color: #fff;
      padding: 20px 24px;
      font-size: 20px;
      outline: none;
    }
    .hero-search-box input::placeholder {
      color: #888;
    }

    .hero-search-box button {
      background: #e50914;
      border: none;
      color: #fff;
      padding: 20px 40px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.2s;
    }
    .hero-search-box button:hover {
      background: #f40612;
    }
    .hero-search-box button:disabled {
      background: #555;
      cursor: not-allowed;
    }

    /* Search section (for results page) */
    .search-section {
      padding: 40px 4%;
    }

    .search-bar {
      display: flex;
      max-width: 600px;
      background: rgba(255,255,255,0.1);
      border: 2px solid #333;
      border-radius: 4px;
      overflow: hidden;
      margin: 0 auto;
    }

    .search-bar input {
      flex: 1;
      background: transparent;
      border: none;
      color: #fff;
      padding: 16px 20px;
      font-size: 16px;
      outline: none;
    }
    .search-bar input::placeholder {
      color: #888;
    }

    .search-bar button {
      background: #e50914;
      border: none;
      color: #fff;
      padding: 16px 32px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.2s;
    }
    .search-bar button:hover {
      background: #f40612;
    }
    .search-bar button:disabled {
      background: #555;
      cursor: not-allowed;
    }

    /* Results count */
    .results-count {
      color: #888;
      font-size: 14px;
      margin-bottom: 16px;
      padding: 0 4%;
    }

    /* Netflix-style rows */
    .netflix-row {
      margin-bottom: 40px;
      padding: 0 4%;
    }

    .row-header {
      font-size: 20px;
      font-weight: bold;
      color: #e5e5e5;
      margin-bottom: 16px;
    }

    .row-slider {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      padding-bottom: 20px;
      scroll-behavior: smooth;
      -webkit-overflow-scrolling: touch;
    }

    .row-slider::-webkit-scrollbar {
      height: 8px;
    }
    .row-slider::-webkit-scrollbar-track {
      background: transparent;
    }
    .row-slider::-webkit-scrollbar-thumb {
      background: #555;
      border-radius: 4px;
    }
    .row-slider::-webkit-scrollbar-thumb:hover {
      background: #777;
    }

    /* Netflix-style cards */
    .movie-card {
      flex: 0 0 auto;
      width: 200px;
      cursor: pointer;
      transition: transform 0.3s, z-index 0.3s;
      position: relative;
      border-radius: 4px;
      overflow: hidden;
    }

    .movie-card:hover {
      transform: scale(1.1);
      z-index: 10;
    }

    .movie-card-poster {
      width: 100%;
      aspect-ratio: 2/3;
      background: #1a1a1a;
      position: relative;
      overflow: hidden;
    }

    .movie-card-poster img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .movie-card-poster .poster-placeholder {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #333;
      font-size: 48px;
    }

    /* Badge */
    .movie-card-badge {
      position: absolute;
      top: 8px;
      left: 8px;
      padding: 4px 8px;
      border-radius: 2px;
      font-size: 11px;
      font-weight: bold;
      text-transform: uppercase;
    }
    .badge-movie {
      background: #e50914;
      color: #fff;
    }
    .badge-series {
      background: #0071eb;
      color: #fff;
    }
    .badge-other {
      background: #666;
      color: #fff;
    }

    /* Hover overlay */
    .movie-card .card-overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, transparent 100%);
      padding: 60px 12px 12px;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .movie-card:hover .card-overlay {
      opacity: 1;
    }

    .card-overlay-title {
      color: #fff;
      font-size: 14px;
      font-weight: bold;
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-overlay-meta {
      color: #aaa;
      font-size: 12px;
      margin-bottom: 8px;
    }

    .card-overlay-play {
      background: #fff;
      color: #000;
      border: none;
      padding: 8px 16px;
      font-size: 14px;
      font-weight: bold;
      border-radius: 4px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: background 0.2s;
    }
    .card-overlay-play:hover {
      background: rgba(255,255,255,0.75);
    }

    /* Loading */
    .movies-loading {
      text-align: center;
      padding: 60px 0;
      color: #888;
    }
    .movies-loading i {
      font-size: 32px;
      margin-bottom: 12px;
    }

    /* Empty state */
    .movies-empty {
      text-align: center;
      padding: 80px 0;
      color: #666;
    }
    .movies-empty i {
      font-size: 64px;
      margin-bottom: 16px;
      color: #444;
    }
    .movies-empty p {
      font-size: 16px;
    }

    /* Main container */
    #container {
      padding-top: 68px;
    }

    /* Footer */
    .index-bottom {
      padding: 40px 4%;
      text-align: center;
      color: #888;
    }
    .index-links a {
      color: #888;
      text-decoration: none;
      margin: 0 8px;
    }
    .index-links a:hover {
      color: #fff;
    }
    .copyright {
      margin-top: 16px;
    }

    /* Animations */
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    .fade-in {
      animation: fadeIn 0.5s ease-out;
    }

    /* Notification dropdown - Netflix style */
    .notif-dropdown {
      background: #141414;
      border: 1px solid #333;
    }
    .notif-dropdown-header {
      background: #1a1a1a;
      border-bottom: 1px solid #333;
    }
    .notif-item {
      border-bottom: 1px solid #333;
    }
    .notif-item:hover {
      background: #1a1a1a;
    }

    .notif-bell-btn {
      background: transparent;
      border: none;
      color: #fff;
    }
    .notif-bell-btn:hover {
      color: #e50914;
    }
  </style>
</head>
<body>

<div id="page">
  <!-- HEADER -->
  <header id="header">
    <div class="wrapper header-inner">
      <div class="header-left">
        <div class="header-logo">
          <span class="logo-text">Darkside</span>
          <span class="logo-slogan">Beyond the Limits</span>
        </div>
      </div>
      <div class="header-right">
        <div class="auth-area">
          <div class="notif-wrapper">
            <button class="notif-bell-btn" id="notif-bell-btn" type="button" aria-label="Notifications">
              <i class="fa fa-bell" id="n-bell-icon"></i>
              <span class="notif-count" id="notif-count">0</span>
            </button>
            <div class="notif-dropdown" id="notif-dropdown">
              <div class="notif-dropdown-header">
                <span><i class="fa fa-bell"></i> Notifications</span>
                <span class="badge" id="notif-badge-count">0</span>
              </div>
              <button type="button" class="notif-clear-btn" id="notif-clear-btn">
                <i class="fa fa-check-double"></i> Mark all as read
              </button>
              <div class="notif-list" id="notif-list"></div>
            </div>
          </div>
          <div class="auth-links"></div>
        </div>
      </div>
    </div>
  </header>

  <!-- NAVBAR -->
  <nav id="navbar">
    <div class="wrapper navbar-inner">
      <ul class="nav-main">
        <li><a href="index.html"><i class="fa fa-home"></i> Home</a></li>
        <li><a href="movies.html"><i class="fa fa-film"></i> Movies</a></li>
      </ul>
    </div>
  </nav>

  <!-- CONTENT -->
  <main id="container">
    <div class="wrapper content-column">

      <!-- Hero Banner -->
      <div class="hero-banner" id="hero-banner">
        <div class="hero-content">
          <h1 class="hero-title">Darkside</h1>
          <div class="hero-search-container">
            <div class="hero-search-box">
              <input type="text" id="hero-search-input" placeholder="Search for movies, TV series..." autocomplete="off">
              <button id="hero-search-btn"><i class="fa fa-search"></i></button>
            </div>
          </div>
        </div>
      </div>

      <!-- Search Section (hidden initially) -->
      <div class="search-section" id="search-section" style="display: none;">
        <div class="search-bar">
          <input type="text" id="movie-search-input" placeholder="Search for a movie or series..." autocomplete="off">
          <button id="movie-search-btn"><i class="fa fa-search"></i></button>
        </div>
      </div>

      <div class="results-count" id="results-count"></div>

      <div id="movies-results">
        <!-- Results will be injected here -->
      </div>


      <!-- FOOTER -->
      <footer class="index-bottom" style="margin-top: 40px;">
        <div class="index-links">
          <a href="#">Mark all threads read</a> ·
          <a href="#">Forum Team</a> ·
          <a href="#">Contact</a>
        </div>
        <div class="copyright">
          &copy; 2026 Darkside. Theme inspired by dark community forums.
        </div>
      </footer>

    </div>
  </main>
</div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script src="auth.js"></script>
  <script src="notifications.js"></script>
  <script>
// movies.js — inlined

const heroSearchInput = document.getElementById('hero-search-input');
const heroSearchBtn = document.getElementById('hero-search-btn');
const searchInput = document.getElementById('movie-search-input');
const searchBtn = document.getElementById('movie-search-btn');
const resultsContainer = document.getElementById('movies-results');
const resultsCount = document.getElementById('results-count');
const header = document.getElementById('header');
const navbar = document.getElementById('navbar');

let isSearching = false;

// Scroll effect for header
window.addEventListener('scroll', () => {
  if (window.scrollY > 50) {
    header.classList.add('scrolled');
    navbar.classList.add('scrolled');
  } else {
    header.classList.remove('scrolled');
    navbar.classList.remove('scrolled');
  }
});

heroSearchBtn.addEventListener('click', () => performHeroSearch());
heroSearchInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') performHeroSearch();
});

searchBtn.addEventListener('click', performSearch);
searchInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') performSearch();
});

async function performHeroSearch() {
  const query = heroSearchInput.value.trim();
  if (!query || isSearching) return;

  // Hide hero and show search section
  document.getElementById('hero-banner').style.display = 'none';
  document.getElementById('search-section').style.display = 'block';
  
  // Copy query to main search input
  searchInput.value = query;
  
  await performSearch();
}

async function performSearch() {
  const query = searchInput.value.trim();
  if (!query || isSearching) return;

  // Hide hero if still visible
  document.getElementById('hero-banner').style.display = 'none';
  document.getElementById('search-section').style.display = 'block';

  isSearching = true;
  searchBtn.disabled = true;
  searchBtn.innerHTML = '<i class="fa fa-spinner fa-spin"></i>';

  resultsContainer.innerHTML = `
    <div class="movies-loading">
      <i class="fa fa-spinner fa-spin"></i>
      Searching for "${escapeHtml(query)}"...
    </div>`;
  resultsCount.textContent = '';

  try {
    const resp = await fetch('/api/credits', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'movie_search', query }),
    });
    const data = await resp.json();
    if (!resp.ok || !data.success) throw new Error(data.error || 'Search failed');
    displayResults(data);
  } catch (err) {
    resultsContainer.innerHTML = `
      <div class="movies-empty">
        <i class="fa fa-exclamation-triangle"></i>
        <p>Search failed: ${escapeHtml(err.message)}</p>
      </div>`;
  } finally {
    isSearching = false;
    searchBtn.disabled = false;
    searchBtn.innerHTML = '<i class="fa fa-search"></i>';
  }
}

function displayResults(data) {
  const countText = data.count_text || '';
  const results = data.results || [];

  if (countText) {
    resultsCount.textContent = countText;
  } else if (results.length > 0) {
    resultsCount.textContent = `Found ${results.length} results`;
  } else {
    resultsCount.textContent = '';
  }

  if (results.length === 0) {
    resultsContainer.innerHTML = `
      <div class="movies-empty">
        <i class="fa fa-search"></i>
        <p>${countText || 'No results found. Try a different search term.'}</p>
      </div>`;
    return;
  }

  const row = document.createElement('div');
  row.className = 'netflix-row fade-in';

  const header = document.createElement('div');
  header.className = 'row-header';
  header.textContent = 'Search Results';
  row.appendChild(header);

  const slider = document.createElement('div');
  slider.className = 'row-slider';

  results.forEach((item, idx) => {
    const card = document.createElement('div');
    card.className = 'movie-card';

    let badgeClass = 'badge-other';
    let badgeText = item.type || '';
    if (item.type && item.type.toLowerCase() === 'movie') badgeClass = 'badge-movie';
    else if (item.type && item.type.toLowerCase() === 'series') badgeClass = 'badge-series';

    const metaParts = [];
    if (item.year) metaParts.push(item.year);
    if (item.type) metaParts.push(item.type);
    const metaText = metaParts.join(' · ');

    card.innerHTML = `
      <div class="movie-card-poster">
        ${item.image_url
          ? `<img src="${escapeHtml(item.image_url)}" alt="${escapeHtml(item.title)}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">
             <div class="poster-placeholder" style="display:none;"><i class="fa fa-film"></i></div>`
          : `<div class="poster-placeholder"><i class="fa fa-film"></i></div>`
        }
        ${badgeText ? `<span class="movie-card-badge ${badgeClass}">${escapeHtml(badgeText)}</span>` : ''}
        <div class="card-overlay">
          <div class="card-overlay-title" title="${escapeHtml(item.title)}">${escapeHtml(item.title)}</div>
          ${metaText ? `<div class="card-overlay-meta">${escapeHtml(metaText)}</div>` : ''}
          <button class="card-overlay-play" data-href="${escapeHtml(item.href)}" data-title="${escapeHtml(item.title)}">
            <i class="fa fa-play"></i> Play
          </button>
        </div>
      </div>
    `;

    const playBtn = card.querySelector('.card-overlay-play');
    const openStream = () => {
      const p = new URLSearchParams();
      p.set('href', item.href);
      p.set('title', item.title);
      if (item.year) p.set('year', item.year);
      if (item.type) p.set('type', item.type);
      if (item.image_url) p.set('poster', item.image_url);
      window.location.href = `watch.html?${p.toString()}`;
    };

    playBtn.addEventListener('click', (e) => { e.stopPropagation(); openStream(); });
    card.addEventListener('click', openStream);

    slider.appendChild(card);
  });

  row.appendChild(slider);
  resultsContainer.innerHTML = '';
  resultsContainer.appendChild(row);
}

function escapeHtml(str) {
  if (!str) return '';
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}
  </script>
</body>
</html>
