<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Now Playing • Darkside</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <link href="styles.css" rel="stylesheet">
  <link href="notifications.css" rel="stylesheet">

  <style>
    body {
      background: #05060a;
      min-height: 100vh;
    }

    /* ── Back bar ── */
    .watch-back-bar {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(5,6,10,0.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      padding: 12px 0;
    }
    .watch-back-inner {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .watch-back-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: #aaa;
      font-size: 13px;
      cursor: pointer;
      transition: color 0.2s;
      text-decoration: none;
      background: none;
      border: none;
      font-family: inherit;
      padding: 0;
    }
    .watch-back-btn:hover {
      color: #e94560;
      text-decoration: none;
    }
    .watch-back-btn i {
      font-size: 14px;
    }
    .watch-back-title {
      color: #666;
      font-size: 12px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* ── Hero banner ── */
    .watch-hero {
      position: relative;
      width: 100%;
      min-height: 340px;
      display: flex;
      align-items: flex-end;
      overflow: hidden;
    }
    .watch-hero-bg {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center 20%;
      filter: blur(20px) brightness(0.35) saturate(1.3);
      transform: scale(1.15);
      z-index: 0;
    }
    .watch-hero-gradient {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to top,
        #05060a 0%,
        rgba(5,6,10,0.85) 30%,
        rgba(5,6,10,0.4) 60%,
        rgba(5,6,10,0.15) 100%
      );
      z-index: 1;
    }
    .watch-hero-content {
      position: relative;
      z-index: 2;
      display: flex;
      align-items: flex-end;
      padding: 0 0 32px;
      width: 100%;
      max-width: 1180px;
      margin: 0 auto;
    }

    /* Info */
    .watch-info {
      flex: 1;
      min-width: 0;
      padding-bottom: 4px;
    }
    .watch-badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 10px;
    }
    .watch-badge-movie { background: rgba(233,69,96,0.85); color: #fff; }
    .watch-badge-series { background: rgba(79,70,229,0.85); color: #fff; }
    .watch-badge-other { background: rgba(100,100,100,0.85); color: #fff; }

    .watch-title {
      font-size: 32px;
      font-weight: 700;
      color: #fff;
      margin: 0 0 8px;
      line-height: 1.2;
      letter-spacing: -0.01em;
      background: linear-gradient(90deg, #ff0000, #ff8800, #ffff00, #00ff00, #0088ff, #8800ff, #ff0088, #ff0000);
      background-size: 400% 100%;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: titleColorShift 6s linear infinite;
    }
    @keyframes titleColorShift {
      0% { background-position: 0% 50%; }
      100% { background-position: 100% 50%; }
    }
    .watch-meta {
      display: flex;
      align-items: center;
      gap: 14px;
      color: #888;
      font-size: 13px;
      flex-wrap: wrap;
    }
    .watch-meta span {
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }
    .watch-meta i {
      font-size: 12px;
      color: #666;
    }
    .watch-meta .meta-dot {
      color: #444;
      font-size: 10px;
    }

    /* ── Player section ── */
    .watch-player-section {
      max-width: 1180px;
      margin: 0 auto;
      padding: 0 0 40px;
    }
    .watch-player-content {
      display: flex;
      gap: 20px;
      align-items: flex-start;
    }
    .watch-player-center {
      flex: 1;
      min-width: 0;
    }
    .watch-player-right {
      width: 320px;
      flex-shrink: 0;
    }
    .watch-player-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 16/9;
      background: #000;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 24px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.04);
    }
    .watch-player-wrap.playing {
      box-shadow: 0 4px 24px rgba(0,0,0,0.5), 0 0 0 1px rgba(233,69,96,0.3);
      animation: playerGlow 3s ease-in-out infinite;
    }
    @keyframes playerGlow {
      0%, 100% { box-shadow: 0 4px 24px rgba(0,0,0,0.5), 0 0 0 1px rgba(233,69,96,0.2), 0 0 20px rgba(233,69,96,0.05); }
      50% { box-shadow: 0 4px 24px rgba(0,0,0,0.5), 0 0 0 1px rgba(233,69,96,0.5), 0 0 40px rgba(233,69,96,0.15); }
    }
    .watch-player-wrap iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }
    .watch-player-loading {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: #666;
      font-size: 14px;
      background: radial-gradient(circle, #111 0%, #000 100%);
    }
    .watch-player-loading i {
      font-size: 36px;
      color: #e94560;
    }
    .watch-player-loading .loading-text {
      color: #888;
    }
    .watch-player-error {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: #e94560;
      font-size: 14px;
      background: radial-gradient(circle, #111 0%, #000 100%);
    }
    .watch-player-error i {
      font-size: 32px;
    }

    /* ── Player controls bar ── */
    .watch-controls {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 12px;
    }
    .watch-ctrl-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.05);
      color: #ccc;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
    }
    .watch-ctrl-btn:hover {
      background: rgba(233,69,96,0.15);
      border-color: rgba(233,69,96,0.4);
      color: #fff;
    }
    .watch-ctrl-btn i {
      font-size: 14px;
    }
    /* ── Episode list ── */
    .watch-episodes {
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 8px;
      padding: 12px;
    }
    .watch-episodes-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
      padding-bottom: 10px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .watch-episodes-title {
      color: #fff;
      font-size: 13px;
      font-weight: 600;
    }
    .watch-episodes-list {
      max-height: 500px;
      overflow-y: auto;
    }
    .watch-episode-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.2s;
      border: 1px solid transparent;
    }
    .watch-episode-item:hover {
      background: rgba(255,255,255,0.05);
    }
    .watch-episode-item.active {
      background: rgba(233,69,96,0.15);
      border-color: rgba(233,69,96,0.3);
    }
    .watch-episode-num {
      background: rgba(233,69,96,0.2);
      color: #e94560;
      padding: 3px 6px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 700;
      min-width: 50px;
      text-align: center;
    }
    .watch-episode-info {
      flex: 1;
      min-width: 0;
    }
    .watch-episode-title {
      color: #ddd;
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .watch-episode-play {
      opacity: 0;
      color: #e94560;
      font-size: 12px;
      transition: opacity 0.2s;
    }
    .watch-episode-item:hover .watch-episode-play {
      opacity: 1;
    }
    .watch-episode-item.watched .watch-episode-num {
      background: rgba(76,175,80,0.2);
      color: #4caf50;
    }
    .watch-episode-watched {
      color: #4caf50;
      font-size: 12px;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .watch-episode-item.watched .watch-episode-watched {
      opacity: 1;
    }

    /* ── Season tabs ── */
    .watch-season-tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }
    .watch-season-tab {
      padding: 4px 10px;
      border-radius: 4px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.03);
      color: #888;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
    }
    .watch-season-tab:hover {
      background: rgba(255,255,255,0.08);
      color: #ccc;
    }
    .watch-season-tab.active {
      background: rgba(233,69,96,0.2);
      border-color: rgba(233,69,96,0.4);
      color: #e94560;
    }

    /* ── Share button ── */
    .watch-share-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.05);
      color: #ccc;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
    }
    .watch-share-btn:hover {
      background: rgba(79,70,229,0.15);
      border-color: rgba(79,70,229,0.4);
      color: #fff;
    }

    /* ── Toast notification ── */
    .watch-toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #111;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 12px 20px;
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      z-index: 10000;
      opacity: 0;
      transition: all 0.3s ease;
      pointer-events: none;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .watch-toast.active {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
    .watch-toast i {
      color: #4caf50;
    }

    /* ── Movie/Series Info Section ── */
    .watch-info-section {
      max-width: 1180px;
      margin: 0 auto 40px;
    }
    .watch-info-content {
      display: flex;
      gap: 24px;
      align-items: flex-start;
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 12px;
      padding: 24px;
    }
    .watch-info-poster {
      flex-shrink: 0;
      width: 180px;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
      background: #111;
      aspect-ratio: 2/3;
    }
    .watch-info-poster img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .watch-info-details {
      flex: 1;
      min-width: 0;
    }
    .watch-info-title {
      font-size: 24px;
      font-weight: 700;
      color: #fff;
      margin: 0 0 12px;
      line-height: 1.3;
    }
    .watch-info-meta {
      display: flex;
      align-items: center;
      gap: 14px;
      color: #888;
      font-size: 13px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .watch-info-meta span {
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }
    .watch-info-meta i {
      font-size: 12px;
      color: #666;
    }
    .watch-info-description {
      color: #aaa;
      font-size: 14px;
      line-height: 1.6;
    }

    /* ── Next episode notification ── */
    .watch-next-notify {
      display: none;
      position: fixed;
      bottom: 30px;
      right: 30px;
      z-index: 1000;
      background: #111;
      border: 1px solid #333;
      border-radius: 12px;
      padding: 16px 20px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.6);
      animation: slideIn 0.3s ease-out;
    }
    .watch-next-notify.active {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .watch-next-notify-content {
      flex: 1;
    }
    .watch-next-notify-title {
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .watch-next-notify-text {
      color: #888;
      font-size: 11px;
    }
    .watch-next-notify-actions {
      display: flex;
      gap: 8px;
    }
    .watch-next-notify-btn {
      padding: 8px 16px;
      border-radius: 6px;
      border: none;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
    }
    .watch-next-notify-play {
      background: #e94560;
      color: #fff;
    }
    .watch-next-notify-play:hover {
      background: #c93654;
    }
    .watch-next-notify-dismiss {
      background: rgba(255,255,255,0.1);
      color: #ccc;
    }
    .watch-next-notify-dismiss:hover {
      background: rgba(255,255,255,0.15);
    }

    /* ── Responsive ── */
    @media (max-width: 900px) {
      .watch-player-content {
        flex-direction: column;
      }
      .watch-player-right {
        width: 100%;
      }
      .watch-episodes-list {
        max-height: 300px;
      }
    }
    @media (max-width: 700px) {
      .watch-info-content {
        flex-direction: column;
      }
      .watch-info-poster {
        width: 100%;
        max-width: 200px;
        margin: 0 auto;
      }
      .watch-info-details {
        text-align: center;
      }
      .watch-info-meta {
        justify-content: center;
      }
    }
    @media (max-width: 700px) {
      .watch-hero-content {
        flex-direction: column;
        align-items: center;
        text-align: center;
        gap: 16px;
        padding-bottom: 24px;
      }
      .watch-poster {
        width: 130px;
      }
      .watch-title {
        font-size: 22px;
      }
      .watch-meta {
        justify-content: center;
      }
      .watch-info {
        display: flex;
        flex-direction: column;
        align-items: center;
      }
    }

    /* ── Fade-in animation ── */
    @keyframes watchFadeIn {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .watch-anim {
      animation: watchFadeIn 0.5s ease-out forwards;
    }
    .watch-anim-delay {
      animation: watchFadeIn 0.5s 0.15s ease-out forwards;
      opacity: 0;
    }
  </style>
</head>
<body>

<div id="page">
  <!-- HEADER -->
  <header id="header">
    <div class="wrapper header-inner">
      <div class="header-left">
        <div class="header-logo">
          <span class="logo-text">Darkside</span>
          <span class="logo-slogan">Beyond the Limits</span>
        </div>
      </div>
      <div class="header-right">
        <div class="auth-area">
          <div class="notif-wrapper">
            <button class="notif-bell-btn" id="notif-bell-btn" type="button" aria-label="Notifications">
              <i class="fa fa-bell" id="n-bell-icon"></i>
              <span class="notif-count" id="notif-count">0</span>
            </button>
            <div class="notif-dropdown" id="notif-dropdown">
              <div class="notif-dropdown-header">
                <span><i class="fa fa-bell"></i> Notifications</span>
                <span class="badge" id="notif-badge-count">0</span>
              </div>
              <button type="button" class="notif-clear-btn" id="notif-clear-btn">
                <i class="fa fa-check-double"></i> Mark all as read
              </button>
              <div class="notif-list" id="notif-list"></div>
            </div>
          </div>
          <div class="auth-links"></div>
        </div>
      </div>
    </div>
  </header>

  <!-- Back bar -->
  <div class="watch-back-bar">
    <div class="wrapper watch-back-inner">
      <a href="movies.html" class="watch-back-btn">
        <i class="fa fa-arrow-left"></i> Back to Movies
      </a>
      <span class="watch-back-title" id="watchBackTitle"></span>
    </div>
  </div>

  <!-- Hero banner -->
  <div class="watch-hero" id="watchHero">
    <div class="watch-hero-bg" id="watchHeroBg"></div>
    <div class="watch-hero-gradient"></div>
    <div class="watch-hero-content watch-anim">
      <div class="watch-info">
        <div class="watch-badge watch-badge-other" id="watchBadge" style="display:none;"></div>
        <h1 class="watch-title" id="watchTitle">Loading...</h1>
        <div class="watch-meta" id="watchMeta"></div>
      </div>
    </div>
  </div>

  <!-- Player -->
  <div class="watch-player-section">
    <div class="wrapper">
      <div class="watch-player-content">
        <div class="watch-player-center">
          <div class="watch-player-wrap watch-anim-delay" id="watchPlayerWrap">
            <div class="watch-player-loading" id="watchPlayerLoading">
              <i class="fa fa-spinner fa-spin"></i>
              <span class="loading-text">Loading player...</span>
            </div>
            <iframe id="watchPlayerIframe"
                    allow="autoplay; fullscreen; picture-in-picture; encrypted-media"
                    referrerpolicy="no-referrer"
                    sandbox="allow-scripts allow-same-origin allow-forms allow-presentation"
                    style="display:none;"></iframe>
          </div>
          <div class="watch-controls" id="watchControls" style="display:none;">
            <button class="watch-ctrl-btn" id="fullscreenBtn" type="button">
              <i class="fa fa-expand"></i> Fullscreen
            </button>
            <button class="watch-share-btn" id="shareBtn" type="button">
              <i class="fa fa-share-alt"></i> Share
            </button>
          </div>
        </div>
        <div class="watch-player-right">
          <div class="watch-episodes" id="watchEpisodes" style="display:none;">
            <div class="watch-episodes-header">
              <span class="watch-episodes-title">Episodes</span>
              <button class="watch-ctrl-btn" id="nextEpisodeBtn" style="padding:6px 12px; font-size:11px;" type="button">
                <i class="fa fa-step-forward"></i> Next
              </button>
            </div>
            <div class="watch-season-tabs" id="watchSeasonTabs"></div>
            <div class="watch-episodes-list" id="watchEpisodesList"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Movie/Series Info Section -->
  <div class="watch-info-section">
    <div class="wrapper">
      <div class="watch-info-content">
        <div class="watch-info-poster" id="watchInfoPoster">
          <div class="watch-poster-placeholder"><i class="fa fa-film"></i></div>
        </div>
        <div class="watch-info-details">
          <div class="watch-badge watch-badge-other" id="watchInfoBadge" style="display:none;"></div>
          <h2 class="watch-info-title" id="watchInfoTitle"></h2>
          <div class="watch-info-meta" id="watchInfoMeta"></div>
          <div class="watch-info-description" id="watchInfoDescription"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Toast notification -->
  <div class="watch-toast" id="watchToast">
    <i class="fa fa-check-circle"></i>
    <span id="watchToastText">Link copied!</span>
  </div>

  <!-- Next episode notification -->
  <div class="watch-next-notify" id="watchNextNotify">
    <div class="watch-next-notify-content">
      <div class="watch-next-notify-title">Next Episode Up</div>
      <div class="watch-next-notify-text" id="watchNextNotifyText">Starting in 60 seconds...</div>
    </div>
    <div class="watch-next-notify-actions">
      <button class="watch-next-notify-btn watch-next-notify-play" id="watchNextNotifyPlay" type="button">Play Now</button>
      <button class="watch-next-notify-btn watch-next-notify-dismiss" id="watchNextNotifyDismiss" type="button">Cancel</button>
    </div>
  </div>

  <!-- FOOTER -->
  <footer class="index-bottom" style="margin-top: 0;">
    <div class="index-links">
      <a href="#">Mark all threads read</a> &middot;
      <a href="#">Forum Team</a> &middot;
      <a href="#">Contact</a>
    </div>
    <div class="copyright">
      &copy; 2026 Darkside. Theme inspired by dark community forums.
    </div>
  </footer>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
<script src="auth.js"></script>
<script src="notifications.js"></script>
<script>
(function() {
  const params = new URLSearchParams(window.location.search);
  const href = params.get('href') || '';
  const title = params.get('title') || '';
  const year = params.get('year') || '';
  const type = params.get('type') || '';
  const poster = params.get('poster') || '';
  const embedParam = params.get('embed') || '';
  const bgUrlParam = params.get('bg_url') || '';
  const descriptionParam = params.get('description') || '';

  if (!href) {
    document.getElementById('watchTitle').textContent = 'No movie specified';
    document.getElementById('watchPlayerLoading').innerHTML =
      '<i class="fa fa-exclamation-triangle"></i><span>No movie href provided</span>';
    document.getElementById('watchPlayerLoading').classList.remove('watch-player-loading');
    document.getElementById('watchPlayerLoading').classList.add('watch-player-error');
    return;
  }

  // ── Populate hero info ──
  document.title = `${title || 'Now Playing'} • Darkside`;
  document.getElementById('watchBackTitle').textContent = title;

  // Badge
  const badge = document.getElementById('watchBadge');
  if (type) {
    badge.textContent = type;
    badge.style.display = '';
    badge.className = 'watch-badge';
    const t = type.toLowerCase();
    if (t === 'movie') badge.classList.add('watch-badge-movie');
    else if (t === 'series') badge.classList.add('watch-badge-series');
    else badge.classList.add('watch-badge-other');
  }

  // Title
  document.getElementById('watchTitle').textContent = title || 'Untitled';

  // Meta
  const metaEl = document.getElementById('watchMeta');
  const metaParts = [];
  if (year) metaParts.push(`<span><i class="fa fa-calendar"></i> ${esc(year)}</span>`);
  if (type) metaParts.push(`<span><i class="fa fa-${type.toLowerCase() === 'series' ? 'tv' : 'film'}"></i> ${esc(type)}</span>`);
  metaEl.innerHTML = metaParts.join('<span class="meta-dot">&bull;</span>');

  // Poster
  const infoPosterEl = document.getElementById('watchInfoPoster');
  if (poster) {
    infoPosterEl.innerHTML = `<img src="${esc(poster)}" alt="${esc(title)}" onerror="this.parentElement.innerHTML='<div class=\\'watch-poster-placeholder\\'><i class=\\'fa fa-film\\'></i></div>';">`;
  }

  // Populate info section
  const infoTitleEl = document.getElementById('watchInfoTitle');
  const infoMetaEl = document.getElementById('watchInfoMeta');
  const infoBadgeEl = document.getElementById('watchInfoBadge');
  const infoDescEl = document.getElementById('watchInfoDescription');

  infoTitleEl.textContent = title || '';
  if (type) {
    infoBadgeEl.textContent = type;
    infoBadgeEl.style.display = '';
    infoBadgeEl.className = 'watch-badge';
    const t = type.toLowerCase();
    if (t === 'movie') infoBadgeEl.classList.add('watch-badge-movie');
    else if (t === 'series') infoBadgeEl.classList.add('watch-badge-series');
    else infoBadgeEl.classList.add('watch-badge-other');
  }

  const infoMetaParts = [];
  if (year) infoMetaParts.push(`<span><i class="fa fa-calendar"></i> ${esc(year)}</span>`);
  if (type) infoMetaParts.push(`<span><i class="fa fa-${type.toLowerCase() === 'series' ? 'tv' : 'film'}"></i> ${esc(type)}</span>`);
  infoMetaEl.innerHTML = infoMetaParts.join('<span class="meta-dot">&bull;</span>');

  infoDescEl.textContent = descriptionParam || '';

  // Hero background - prefer bg_url (from hero slider), fallback to poster
  const heroBg = bgUrlParam || poster;
  if (heroBg) {
    document.getElementById('watchHeroBg').style.backgroundImage = `url('${heroBg}')`;
  }

  // Save to Continue Watching
  try {
    let cw = JSON.parse(localStorage.getItem('continueWatching') || '[]');
    cw = cw.filter(i => i.href !== href);
    cw.unshift({
      href, title, image_url: poster, bg_url: bgUrlParam,
      type, year, embed: embedParam, description: descriptionParam,
      timestamp: Date.now(),
    });
    cw = cw.slice(0, 20);
    localStorage.setItem('continueWatching', JSON.stringify(cw));
  } catch(e) {}

  // ── Block popups from iframe ──
  const originalOpen = window.open;
  window.open = function(url, target, features) {
    // Block all popup attempts from the iframe
    console.warn('Blocked popup:', url);
    return null;
  };

  // Prevent click hijacking
  document.addEventListener('click', function(e) {
    // Check if click originated from iframe
    if (e.target.tagName === 'IFRAME' || e.target.closest('iframe')) {
      e.stopPropagation();
      e.preventDefault();
    }
  }, true);

  // Block window.location changes from iframe
  let currentLocation = window.location.href;
  setInterval(function() {
    if (window.location.href !== currentLocation && window.location.href !== currentLocation) {
      // If location changed unexpectedly, revert it
      window.location.href = currentLocation;
    }
  }, 1000);

  window.addEventListener('beforeunload', function(e) {
    // only allow navigation back to movies
    if (e.target === window) return;
  });

  // ── Episode handling for TV series ──
  let episodes = [];
  let currentEpisodeIndex = -1;
  let nextEpisodeTimer = null;
  let nextEpisodeCountdown = 60;
  let currentSeason = 1;
  let watchedEpisodes = {};

  // Load watch progress from localStorage
  function loadWatchProgress() {
    try {
      const stored = localStorage.getItem('watchProgress');
      if (stored) watchedEpisodes = JSON.parse(stored);
    } catch(e) {}
  }
  function saveWatchProgress() {
    try {
      localStorage.setItem('watchProgress', JSON.stringify(watchedEpisodes));
    } catch(e) {}
  }
  function markWatched(epHref) {
    watchedEpisodes[epHref] = true;
    saveWatchProgress();
  }
  function isWatched(epHref) {
    return !!watchedEpisodes[epHref];
  }

  async function loadEpisodes() {
    if (!href || !href.startsWith('/tv/')) return;

    loadWatchProgress();

    try {
      const resp = await fetch('/api/credits', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'movie_fetch_episodes', href }),
      });
      const data = await resp.json();
      if (data.success && data.episodes.length > 0) {
        episodes = data.episodes;
        renderSeasonTabs();
        renderEpisodes();

        // Find current episode from href
        const currentMatch = href.match(/\/season\/(\d+)\/episode\/(\d+)/);
        if (currentMatch) {
          const currentSeasonNum = parseInt(currentMatch[1]);
          const currentEp = parseInt(currentMatch[2]);
          currentEpisodeIndex = episodes.findIndex(e => e.season === currentSeasonNum && e.episode === currentEp);
          if (currentEpisodeIndex === -1) currentEpisodeIndex = 0;
          currentSeason = currentSeasonNum;
        } else {
          // Resume from last watched episode
          const lastWatched = episodes.find(ep => isWatched(ep.href));
          if (lastWatched) {
            currentEpisodeIndex = episodes.indexOf(lastWatched);
            currentSeason = lastWatched.season;
          } else {
            currentEpisodeIndex = 0;
            currentSeason = episodes[0].season;
          }
        }
        renderSeasonTabs();
        renderEpisodes();
        updateEpisodeActiveState();
      }
    } catch (err) {
      console.warn('Failed to load episodes:', err);
    }
  }

  function renderSeasonTabs() {
    const tabsEl = document.getElementById('watchSeasonTabs');
    if (episodes.length === 0) { tabsEl.innerHTML = ''; return; }

    const seasons = [...new Set(episodes.map(e => e.season))];
    tabsEl.innerHTML = '';

    seasons.forEach(s => {
      const tab = document.createElement('button');
      tab.className = 'watch-season-tab' + (s === currentSeason ? ' active' : '');
      tab.textContent = `Season ${s}`;
      tab.type = 'button';
      tab.addEventListener('click', () => {
        currentSeason = s;
        renderSeasonTabs();
        renderEpisodes();
        updateEpisodeActiveState();
      });
      tabsEl.appendChild(tab);
    });
  }

  function renderEpisodes() {
    const episodesEl = document.getElementById('watchEpisodes');
    const listEl = document.getElementById('watchEpisodesList');

    if (episodes.length === 0) {
      episodesEl.style.display = 'none';
      return;
    }

    episodesEl.style.display = 'block';
    listEl.innerHTML = '';

    const filtered = episodes.filter(e => e.season === currentSeason);

    filtered.forEach((ep) => {
      const idx = episodes.indexOf(ep);
      const item = document.createElement('div');
      item.className = 'watch-episode-item' + (isWatched(ep.href) ? ' watched' : '');
      item.dataset.index = idx;
      item.innerHTML = `
        <div class="watch-episode-num">E${ep.episode}</div>
        <div class="watch-episode-info">
          <div class="watch-episode-title">${esc(ep.title || `Episode ${ep.episode}`)}</div>
        </div>
        <div class="watch-episode-watched"><i class="fa fa-check-circle"></i></div>
        <div class="watch-episode-play"><i class="fa fa-play"></i></div>
      `;
      item.addEventListener('click', () => playEpisode(idx));
      listEl.appendChild(item);
    });

    updateEpisodeActiveState();
  }

  function updateEpisodeActiveState() {
    const items = document.querySelectorAll('.watch-episode-item');
    items.forEach((item) => {
      const idx = parseInt(item.dataset.index);
      if (idx === currentEpisodeIndex) {
        item.classList.add('active');
      } else {
        item.classList.remove('active');
      }
    });
  }

  function playEpisode(idx) {
    if (idx < 0 || idx >= episodes.length) return;
    const ep = episodes[idx];
    currentEpisodeIndex = idx;
    currentSeason = ep.season;

    // Mark as watched
    markWatched(ep.href);

    // Load the episode (only refresh iframe, not whole page)
    loadPlayerForHref(ep.href);
    renderEpisodes();
    updateEpisodeActiveState();

    // Start next episode timer (assume 45 min episodes)
    startNextEpisodeTimer();
  }

  async function loadPlayerForHref(epHref) {
    const loadingEl = document.getElementById('watchPlayerLoading');
    const iframeEl = document.getElementById('watchPlayerIframe');
    const controlsEl = document.getElementById('watchControls');
    const wrapEl = document.getElementById('watchPlayerWrap');

    loadingEl.style.display = 'flex';
    loadingEl.innerHTML = '<i class="fa fa-spinner fa-spin"></i><span class="loading-text">Loading player...</span>';
    iframeEl.style.display = 'none';
    wrapEl.classList.remove('playing');

    try {
      const resp = await fetch('/api/credits', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'movie_play', href: epHref }),
      });
      const data = await resp.json();
      if (!data.success) throw new Error(data.error || 'Failed to load movie');

      embedUrl = data.embed_url;
      iframeEl.src = embedUrl;
      iframeEl.style.display = 'block';
      loadingEl.style.display = 'none';
      controlsEl.style.display = 'flex';
      wrapEl.classList.add('playing');
    } catch (err) {
      loadingEl.className = 'watch-player-error';
      loadingEl.innerHTML = `<i class="fa fa-exclamation-triangle"></i><span>${esc(err.message)}</span>`;
    }
  }

  async function loadPlayer() {
    const loadingEl = document.getElementById('watchPlayerLoading');
    const iframeEl = document.getElementById('watchPlayerIframe');
    const controlsEl = document.getElementById('watchControls');
    const wrapEl = document.getElementById('watchPlayerWrap');

    loadingEl.style.display = 'flex';
    loadingEl.innerHTML = '<i class="fa fa-spinner fa-spin"></i><span class="loading-text">Loading player...</span>';
    iframeEl.style.display = 'none';
    wrapEl.classList.remove('playing');

    try {
      const resp = await fetch('/api/credits', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'movie_play', href }),
      });
      const data = await resp.json();
      if (!data.success) throw new Error(data.error || 'Failed to load movie');

      embedUrl = data.embed_url;
      iframeEl.src = embedUrl;
      iframeEl.style.display = 'block';
      loadingEl.style.display = 'none';
      controlsEl.style.display = 'flex';
      wrapEl.classList.add('playing');
    } catch (err) {
      loadingEl.className = 'watch-player-error';
      loadingEl.innerHTML = `<i class="fa fa-exclamation-triangle"></i><span>${esc(err.message)}</span>`;
    }
  }

  function startNextEpisodeTimer() {
    // Clear existing timer
    if (nextEpisodeTimer) {
      clearInterval(nextEpisodeTimer);
      nextEpisodeTimer = null;
    }

    // Check if there's a next episode
    if (currentEpisodeIndex < 0 || currentEpisodeIndex >= episodes.length - 1) return;

    nextEpisodeCountdown = 60; // 60 seconds before end
    const notifyEl = document.getElementById('watchNextNotify');
    const textEl = document.getElementById('watchNextNotifyText');

    // Start countdown (assume 45 min episode, show notification at 44 min)
    setTimeout(() => {
      showNextEpisodeNotification();
    }, 2700000); // 45 minutes after load (44 min before end)
  }

  function showNextEpisodeNotification() {
    if (currentEpisodeIndex < 0 || currentEpisodeIndex >= episodes.length - 1) return;

    const notifyEl = document.getElementById('watchNextNotify');
    const textEl = document.getElementById('watchNextNotifyText');
    const nextEp = episodes[currentEpisodeIndex + 1];

    notifyEl.classList.add('active');
    textEl.textContent = `Next: S${nextEp.season} E${nextEp.episode} - ${esc(nextEp.title || `Episode ${nextEp.episode}`)}`;

    nextEpisodeCountdown = 60;
    nextEpisodeTimer = setInterval(() => {
      nextEpisodeCountdown--;
      textEl.textContent = `Next: S${nextEp.season} E${nextEp.episode} - ${esc(nextEp.title || `Episode ${nextEp.episode}`)} (${nextEpisodeCountdown}s)`;

      if (nextEpisodeCountdown <= 0) {
        clearInterval(nextEpisodeTimer);
        nextEpisodeTimer = null;
        notifyEl.classList.remove('active');
        playEpisode(currentEpisodeIndex + 1);
      }
    }, 1000);
  }

  function hideNextEpisodeNotification() {
    const notifyEl = document.getElementById('watchNextNotify');
    notifyEl.classList.remove('active');
    if (nextEpisodeTimer) {
      clearInterval(nextEpisodeTimer);
      nextEpisodeTimer = null;
    }
  }

  document.getElementById('nextEpisodeBtn').addEventListener('click', () => {
    if (currentEpisodeIndex >= 0 && currentEpisodeIndex < episodes.length - 1) {
      playEpisode(currentEpisodeIndex + 1);
    }
  });

  document.getElementById('watchNextNotifyPlay').addEventListener('click', () => {
    hideNextEpisodeNotification();
    if (currentEpisodeIndex >= 0 && currentEpisodeIndex < episodes.length - 1) {
      playEpisode(currentEpisodeIndex + 1);
    }
  });

  document.getElementById('watchNextNotifyDismiss').addEventListener('click', hideNextEpisodeNotification);

  // ── Load embed URL via API ──
  let embedUrl = '';
  loadPlayer();
  loadEpisodes();

  async function loadPlayer() {
    const loadingEl = document.getElementById('watchPlayerLoading');
    const iframeEl = document.getElementById('watchPlayerIframe');
    const controlsEl = document.getElementById('watchControls');
    const wrapEl = document.getElementById('watchPlayerWrap');

    // If embed param is provided directly (from hero slider), use it immediately
    if (embedParam) {
      embedUrl = `https://streamimdb.ru${embedParam}`;
      iframeEl.src = embedUrl;
      iframeEl.style.display = 'block';
      loadingEl.style.display = 'none';
      controlsEl.style.display = 'flex';
      wrapEl.classList.add('playing');
      return;
    }

    try {
      const resp = await fetch('/api/credits', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'movie_play', href }),
      });
      const data = await resp.json();
      if (!data.success) throw new Error(data.error || 'Failed to load movie');

      embedUrl = data.embed_url;
      iframeEl.src = embedUrl;
      iframeEl.style.display = 'block';
      loadingEl.style.display = 'none';
      controlsEl.style.display = 'flex';
      wrapEl.classList.add('playing');
    } catch (err) {
      loadingEl.className = 'watch-player-error';
      loadingEl.innerHTML = `<i class="fa fa-exclamation-triangle"></i><span>${esc(err.message)}</span>`;
    }
  }

  // ── Fullscreen ──
  const fullscreenBtn = document.getElementById('fullscreenBtn');
  fullscreenBtn.addEventListener('click', function() {
    const wrap = document.getElementById('watchPlayerWrap');
    if (wrap.requestFullscreen) wrap.requestFullscreen();
    else if (wrap.webkitRequestFullscreen) wrap.webkitRequestFullscreen();
  });

  // ── Share button ──
  const shareBtn = document.getElementById('shareBtn');
  shareBtn.addEventListener('click', function() {
    const url = window.location.href;
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(url).then(() => showToast('Link copied to clipboard!'));
    } else {
      // Fallback
      const input = document.createElement('input');
      input.value = url;
      document.body.appendChild(input);
      input.select();
      document.execCommand('copy');
      document.body.removeChild(input);
      showToast('Link copied to clipboard!');
    }
  });

  function showToast(msg) {
    const toast = document.getElementById('watchToast');
    const text = document.getElementById('watchToastText');
    text.textContent = msg;
    toast.classList.add('active');
    setTimeout(() => toast.classList.remove('active'), 2500);
  }

  function esc(str) {
    if (!str) return '';
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }
})();
</script>
</body>
</html>
