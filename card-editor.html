<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Edit Profile Card • Darkside</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Playfair+Display:ital,wght@0,300;1,400&family=Rajdhani:wght@700&family=Press+Start+2P&family=Pacifico&family=Cinzel:wght@700&display=swap" rel="stylesheet">
  <link href="styles.css" rel="stylesheet">
  <link href="userroles.css" rel="stylesheet">
  <style>
    body {
      background: #0a0a0a;
      min-height: 100vh;
    }
    .editor-container {
      max-width: 800px;
      margin: 0 auto;
      padding: 20px;
    }
    .editor-header {
      text-align: center;
      margin-bottom: 30px;
    }
    .editor-header h1 {
      font-size: 28px;
      color: #fff;
      margin-bottom: 10px;
    }
    .editor-header p {
      color: #888;
      font-size: 14px;
    }
    .editor-card {
      background: #151515;
      border: 1px solid #222;
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 20px;
    }
    .editor-section {
      margin-bottom: 24px;
    }
    .editor-section h3 {
      color: #fff;
      font-size: 16px;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .form-group {
      margin-bottom: 16px;
    }
    .form-group label {
      display: block;
      color: #aaa;
      font-size: 13px;
      margin-bottom: 6px;
    }
    .form-group input,
    .form-group textarea,
    .form-group select {
      width: 100%;
      padding: 10px 12px;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 6px;
      color: #fff;
      font-size: 14px;
      font-family: inherit;
    }
    .form-group input:focus,
    .form-group textarea:focus,
    .form-group select:focus {
      outline: none;
      border-color: #7c3aed;
    }
    .form-group textarea {
      min-height: 80px;
      resize: vertical;
    }
    .color-picker-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .color-picker-group {
      flex: 1;
      min-width: 120px;
    }
    .color-picker-group label {
      font-size: 12px;
    }
    .color-picker-group input[type="color"] {
      width: 100%;
      height: 40px;
      padding: 4px;
      cursor: pointer;
    }
    .social-links-container {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .social-link-row {
      display: flex;
      gap: 10px;
      align-items: center;
    }
    .social-link-row select {
      width: 120px;
      flex-shrink: 0;
    }
    .social-link-row input {
      flex: 1;
    }
    .btn-remove-social {
      padding: 10px;
      background: #2a1a1a;
      border: 1px solid #3a2a2a;
      border-radius: 6px;
      color: #ff6b6b;
      cursor: pointer;
      flex-shrink: 0;
    }
    .btn-remove-social:hover {
      background: #3a2a2a;
    }
    .btn-add-social {
      padding: 10px 16px;
      background: #1a2a1a;
      border: 1px solid #2a3a2a;
      border-radius: 6px;
      color: #6bff6b;
      cursor: pointer;
      font-size: 13px;
    }
    .btn-add-social:hover {
      background: #2a3a2a;
    }
    .preview-section {
      margin-top: 30px;
    }
    .preview-section h3 {
      color: #fff;
      font-size: 16px;
      margin-bottom: 12px;
    }
    .preview-frame {
      background: #000;
      border: 1px solid #222;
      border-radius: 8px;
      overflow: hidden;
      aspect-ratio: 16/9;
      position: relative;
    }
    .preview-content {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      z-index: 1;
    }
    .preview-content .username {
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 12px;
    }
    .preview-content .badge {
      font-size: 14px;
      padding: 6px 12px;
      border-radius: 20px;
      margin-bottom: 16px;
    }
    .preview-content .social-links {
      display: flex;
      gap: 12px;
    }
    .preview-content .social-link {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255,255,255,0.1);
      color: #fff;
      text-decoration: none;
      font-size: 18px;
    }
    .preview-avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid rgba(255,255,255,0.2);
      margin-bottom: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    }
    .preview-video {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
      pointer-events: none;
      border: none;
      user-select: none;
    }
    .preview-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      z-index: 0;
    }
        .btn-save {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #7c3aed 0%, #5b21b6 100%);
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 20px;
    }
    .btn-save:hover {
      background: linear-gradient(135deg, #8b5cf6 0%, #6d28d9 100%);
    }
    .btn-save:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .status-message {
      text-align: center;
      margin-top: 12px;
      font-size: 14px;
    }
    .status-message.success {
      color: #6bff6b;
    }
    .status-message.error {
      color: #ff6b6b;
    }
    .back-link {
      display: inline-block;
      color: #7c3aed;
      text-decoration: none;
      margin-bottom: 20px;
      font-size: 14px;
    }
    .back-link:hover {
      text-decoration: underline;
    }
    
    /* Amazing Text Effects - Same as card.html */
    .text-rainbow {
      background: linear-gradient(45deg, #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #4b0082, #9400d3, #ff0000);
      background-size: 400% 400%;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: rainbow 3s ease infinite;
    }
    
    @keyframes rainbow {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    
    .text-sparkle {
      position: relative;
      color: #fff;
      animation: sparkle 2s linear infinite;
    }
    
    .text-sparkle::before {
      content: attr(data-text);
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(45deg, transparent 30%, rgba(255,255,255,0.5) 50%, transparent 70%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: shimmer 3s infinite;
    }
    
    @keyframes sparkle {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.8; }
    }
    
    @keyframes shimmer {
      0% { background-position: -200% center; }
      100% { background-position: 200% center; }
    }
    
    .text-glow {
      color: #fff;
      text-shadow: 0 0 10px currentColor, 0 0 20px currentColor, 0 0 30px currentColor, 0 0 40px currentColor;
      animation: glow-pulse 2s ease-in-out infinite alternate;
    }
    
    @keyframes glow-pulse {
      from { text-shadow: 0 0 10px currentColor, 0 0 20px currentColor, 0 0 30px currentColor; }
      to { text-shadow: 0 0 20px currentColor, 0 0 30px currentColor, 0 0 40px currentColor, 0 0 50px currentColor; }
    }
    
    .text-neon {
      color: #fff;
      text-shadow: 
        0 0 7px #fff,
        0 0 10px #fff,
        0 0 21px #fff,
        0 0 42px #0fa,
        0 0 82px #0fa,
        0 0 92px #0fa,
        0 0 102px #0fa,
        0 0 151px #0fa;
      animation: neon-flicker 1.5s infinite alternate;
    }
    
    @keyframes neon-flicker {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.8; }
    }
    
    .text-fire {
      background: linear-gradient(to top, #ff0000, #ff7f00, #ffff00, #ffffff);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: fire-dance 1.5s ease-in-out infinite alternate;
    }
    
    @keyframes fire-dance {
      0% { transform: scale(1) translateY(0); }
      100% { transform: scale(1.05) translateY(-2px); }
    }
    
    .text-ice {
      background: linear-gradient(45deg, #00d4ff, #0099cc, #006699, #00d4ff);
      background-size: 200% 200%;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: ice-shimmer 3s ease-in-out infinite;
    }
    
    @keyframes ice-shimmer {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }
    
    .text-galaxy {
      background: linear-gradient(45deg, #667eea 0%, #764ba2 25%, #f093fb 50%, #c471f5 75%, #667eea 100%);
      background-size: 400% 400%;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: galaxy-rotate 8s linear infinite;
    }
    
    @keyframes galaxy-rotate {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    
    .text-matrix {
      color: #0f0;
      text-shadow: 0 0 5px #0f0, 0 0 10px #0f0;
      font-family: 'Courier New', monospace;
      animation: matrix-rain 2s linear infinite;
    }
    
    @keyframes matrix-rain {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; text-shadow: 0 0 5px #0f0, 0 0 15px #0f0, 0 0 25px #0f0; }
    }
    
    .text-holographic {
      background: linear-gradient(45deg, #ff0080, #ff8c00, #40e0d0, #ff0080);
      background-size: 300% 300%;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: holographic-shift 4s ease-in-out infinite;
    }
    
    @keyframes holographic-shift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    
    /* Font Styles */
    .font-cyberpunk {
      font-family: 'Orbitron', 'Courier New', monospace;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 2px;
    }
    
    .font-elegant {
      font-family: 'Playfair Display', 'Georgia', serif;
      font-weight: 300;
      font-style: italic;
    }
    
    .font-futuristic {
      font-family: 'Rajdhani', 'Arial', sans-serif;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 3px;
    }
    
    .font-retro {
      font-family: 'Press Start 2P', 'Courier New', monospace;
      font-weight: 400;
    }
    
    .font-brush {
      font-family: 'Pacifico', 'cursive', sans-serif;
      font-weight: 400;
    }
    
    .font-gothic {
      font-family: 'Cinzel', 'Georgia', serif;
      font-weight: 700;
      text-transform: uppercase;
    }
    
    .text-effects-section {
      margin-bottom: 24px;
    }
    
    .text-effects-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 16px;
    }
    
    .effect-select-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    
    .effect-select-group label {
      color: #aaa;
      font-size: 13px;
      margin-bottom: 4px;
    }
    
    .effect-select-group select {
      width: 100%;
      padding: 8px 12px;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 6px;
      color: #fff;
      font-size: 14px;
      font-family: inherit;
    }
    
    .effect-select-group select:focus {
      outline: none;
      border-color: #7c3aed;
    }
  </style>
</head>
<body>
  <div class="editor-container">
    <a href="index.html" class="back-link"><i class="fa fa-arrow-left"></i> Back to Home</a>
    
    <div class="editor-header">
      <h1><i class="fa fa-id-card"></i> Profile Card Editor</h1>
      <p>Create your custom profile card. Your card will be available at the-darkside.me/yourusername</p>
    </div>

    <div class="editor-card">
      <div class="editor-section">
        <h3><i class="fa fa-video"></i> Video Background</h3>
        <div class="form-group">
          <label>Catbox.moe Video URL</label>
          <input type="url" id="videoUrl" placeholder="https://files.catbox.moe/yourvideo.mp4">
          <small style="color: #666; font-size: 12px; display: block; margin-top: 4px;">Upload to catbox.moe and paste the direct link here</small>
        </div>
      </div>
      
      <div class="text-effects-section">
        <h3><i class="fa fa-magic"></i> Text Effects & Fonts</h3>
        <div class="text-effects-grid">
          <div class="effect-select-group">
            <label>Username Effect</label>
            <select id="usernameEffect">
              <option value="none">None</option>
              <option value="text-rainbow">🌈 Rainbow</option>
              <option value="text-sparkle">✨ Sparkle</option>
              <option value="text-glow">💫 Glow</option>
              <option value="text-neon">💡 Neon</option>
              <option value="text-fire">🔥 Fire</option>
              <option value="text-ice">❄️ Ice</option>
              <option value="text-galaxy">🌌 Galaxy</option>
              <option value="text-matrix">💻 Matrix</option>
              <option value="text-holographic">🎆 Holographic</option>
            </select>
          </div>
          
          <div class="effect-select-group">
            <label>Username Font</label>
            <select id="usernameFont">
              <option value="default">Default</option>
              <option value="font-cyberpunk">🤖 Cyberpunk</option>
              <option value="font-elegant">🎩 Elegant</option>
              <option value="font-futuristic">🚀 Futuristic</option>
              <option value="font-retro">🎮 Retro</option>
              <option value="font-brush">🎨 Brush</option>
              <option value="font-gothic">🏰 Gothic</option>
            </select>
          </div>
          
          <div class="effect-select-group">
            <label>Badge Effect</label>
            <select id="badgeEffect">
              <option value="none">None</option>
              <option value="text-rainbow">🌈 Rainbow</option>
              <option value="text-sparkle">✨ Sparkle</option>
              <option value="text-glow">💫 Glow</option>
              <option value="text-neon">💡 Neon</option>
              <option value="text-fire">🔥 Fire</option>
              <option value="text-ice">❄️ Ice</option>
              <option value="text-galaxy">🌌 Galaxy</option>
              <option value="text-matrix">💻 Matrix</option>
              <option value="text-holographic">🎆 Holographic</option>
            </select>
          </div>
          
          <div class="effect-select-group">
            <label>Badge Font</label>
            <select id="badgeFont">
              <option value="default">Default</option>
              <option value="font-cyberpunk">🤖 Cyberpunk</option>
              <option value="font-elegant">🎩 Elegant</option>
              <option value="font-futuristic">🚀 Futuristic</option>
              <option value="font-retro">🎮 Retro</option>
              <option value="font-brush">🎨 Brush</option>
              <option value="font-gothic">🏰 Gothic</option>
            </select>
          </div>
          
          <div class="effect-select-group">
            <label>Bio Effect</label>
            <select id="bioEffect">
              <option value="none">None</option>
              <option value="text-rainbow">🌈 Rainbow</option>
              <option value="text-sparkle">✨ Sparkle</option>
              <option value="text-glow">💫 Glow</option>
              <option value="text-neon">💡 Neon</option>
              <option value="text-fire">🔥 Fire</option>
              <option value="text-ice">❄️ Ice</option>
              <option value="text-galaxy">🌌 Galaxy</option>
              <option value="text-matrix">💻 Matrix</option>
              <option value="text-holographic">🎆 Holographic</option>
            </select>
          </div>
          
          <div class="effect-select-group">
            <label>Bio Font</label>
            <select id="bioFont">
              <option value="default">Default</option>
              <option value="font-cyberpunk">🤖 Cyberpunk</option>
              <option value="font-elegant">🎩 Elegant</option>
              <option value="font-futuristic">🚀 Futuristic</option>
              <option value="font-retro">🎮 Retro</option>
              <option value="font-brush">🎨 Brush</option>
              <option value="font-gothic">🏰 Gothic</option>
            </select>
          </div>
        </div>
      </div>

      <div class="editor-section">
        <h3><i class="fa fa-palette"></i> Colors</h3>
        <div class="color-picker-row">
          <div class="color-picker-group">
            <label>Background</label>
            <input type="color" id="bgColor" value="#0a0a0a" />
          </div>
          <div class="color-picker-group">
            <label>Text</label>
            <input type="color" id="textColor" value="#ffffff" />
          </div>
          <div class="color-picker-group">
            <label>Accent</label>
            <input type="color" id="accentColor" value="#7c3aed" />
          </div>
        </div>
      </div>

      <div class="editor-section">
        <h3><i class="fa fa-user"></i> Profile Info</h3>
        <div class="form-group">
          <label>Display Username</label>
          <input type="text" id="displayUsername" placeholder="Your username" />
        </div>
        <div class="form-group">
          <label>Badge Text</label>
          <input type="text" id="badgeText" placeholder="Owner • Admin • Elite" />
        </div>
        <div class="form-group">
          <label>Bio</label>
          <textarea id="bio" placeholder="Short bio or tagline..."></textarea>
        </div>
      </div>

      <div class="editor-section">
        <h3><i class="fa fa-share-alt"></i> Social Links</h3>
        <div class="social-links-container" id="socialLinksContainer">
          <!-- Social links will be added here -->
        </div>
        <button class="btn-add-social" onclick="addSocialLink()"><i class="fa fa-plus"></i> Add Link</button>
      </div>

      <div class="preview-section">
        <h3><i class="fa fa-eye"></i> Preview</h3>
        <div class="preview-frame" id="previewFrame">
          <div class="preview-content" id="previewContent">
            <div class="username" id="previewUsername">Username</div>
            <div class="badge" id="previewBadge">Badge</div>
            <div class="social-links" id="previewSocialLinks"></div>
          </div>
        </div>
      </div>

      <button class="btn-save" id="saveBtn" onclick="saveCard()"><i class="fa fa-save"></i> Save Profile Card</button>
      <div class="status-message" id="statusMessage"></div>
    </div>
  </div>

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
    import { SUPABASE_ANON_KEY } from './keys.js';

    const supabase = createClient('https://ffmkkwskvjvytdddevmm.supabase.co', SUPABASE_ANON_KEY);

    let socialLinks = [];
    let existingCard = null;
    let userAvatarUrl = null;

    // Initialize
    async function init() {
      // Check if user is admin/owner
      const { data: { user: authUser } } = await supabase.auth.getUser();
      if (!authUser) {
        window.location.href = 'accounts.html';
        return;
      }

      const { data: userData } = await supabase
        .from('users')
        .select('role, avatar_url')
        .eq('id', authUser.id)
        .maybeSingle();

      userAvatarUrl = userData?.avatar_url || null;

      if (!userData || (userData.role !== 'admin' && userData.role !== 'owner')) {
        alert('Access denied. Admin/Owner only.');
        window.location.href = 'index.html';
        return;
      }

      // Load existing card data
      await loadExistingCard(authUser.id);

      // Set up live preview
      setupLivePreview();
    }

    async function loadExistingCard(userId) {
      const { data: card } = await supabase
        .from('profile_cards')
        .select('*')
        .eq('user_id', userId)
        .maybeSingle();

      if (card) {
        existingCard = card;
        document.getElementById('videoUrl').value = card.video_url || '';
        document.getElementById('bgColor').value = card.background_color || '#0a0a0a';
        document.getElementById('textColor').value = card.text_color || '#ffffff';
        document.getElementById('accentColor').value = card.accent_color || '#7c3aed';
        document.getElementById('displayUsername').value = card.username || '';
        document.getElementById('badgeText').value = card.badge || '';
        document.getElementById('bio').value = card.bio || '';

        // Load social links
        if (card.social_links && Array.isArray(card.social_links)) {
          socialLinks = card.social_links;
          renderSocialLinks();
        }
      } else {
        // Set default username from auth user
        const { data: { user: authUser } } = await supabase.auth.getUser();
        const { data: userData } = await supabase
          .from('users')
          .select('username')
          .eq('id', authUser.id)
          .maybeSingle();
        if (userData?.username) {
          document.getElementById('displayUsername').value = userData.username;
        }
      }

      updatePreview();
    }

    function setupLivePreview() {
      const inputs = ['videoUrl', 'bgColor', 'textColor', 'accentColor', 'displayUsername', 'badgeText', 'bio', 
                      'usernameEffect', 'usernameFont', 'badgeEffect', 'badgeFont', 'bioEffect', 'bioFont'];
      inputs.forEach(id => {
        document.getElementById(id).addEventListener('input', updatePreview);
      });
    }

    function updatePreview() {
      const username = document.getElementById('username').value || 'Your Username';
      const badge = document.getElementById('badge').value;
      const bio = document.getElementById('bio').value;
      const videoUrl = document.getElementById('videoUrl').value;
      const bgColor = document.getElementById('bgColor').value;
      const textColor = document.getElementById('textColor').value;
      const accentColor = document.getElementById('accentColor').value;
      
      // Get text effects and fonts
      const usernameEffect = document.getElementById('usernameEffect').value;
      const usernameFont = document.getElementById('usernameFont').value;
      const badgeEffect = document.getElementById('badgeEffect').value;
      const badgeFont = document.getElementById('badgeFont').value;
      const bioEffect = document.getElementById('bioEffect').value;
      const bioFont = document.getElementById('bioFont').value;
      const previewFrame = document.getElementById('previewFrame');
      const previewContent = document.getElementById('previewContent');

      previewFrame.style.backgroundColor = bgColor;

      // Update video if provided
      let videoHtml = '';
      if (videoUrl) {
        videoHtml = `<video class="preview-video" autoplay loop playsinline><source src="${videoUrl}" type="video/mp4"></video>`;
        videoHtml += '<div class="preview-overlay"></div>';
      }
      const avatarHtml = userAvatarUrl ? `<img src="${userAvatarUrl}" class="preview-avatar" alt="Avatar" style="border-color: ${accentColor};">` : '';
      previewFrame.innerHTML = videoHtml + `
        <div class="preview-content" id="previewContent">
          ${avatarHtml}
          <div class="username ${usernameEffect} ${usernameFont}" style="color: ${textColor};">${username}</div>
          ${badge ? `<div class="badge ${badgeEffect} ${badgeFont}" style="background: ${accentColor}; color: #fff;">${badge}</div>` : ''}
          ${bio ? `<p class="bio ${bioEffect} ${bioFont}" style="color: ${textColor};">${bio}</p>` : ''}
          <div class="social-links" id="previewSocialLinks"></div>
        </div>
      `;

      // Update social links in preview
      const socialLinksContainer = document.getElementById('previewSocialLinks');
      socialLinksContainer.innerHTML = '';
      socialLinks.forEach(link => {
        const icon = getSocialIcon(link.platform);
        socialLinksContainer.innerHTML += `
          <a href="${link.url}" class="social-link" style="background: ${accentColor}20;">
            <i class="${icon}"></i>
          </a>
        `;
      });

      // Try to click video with XPath for sound
      if (videoUrl) {
        setTimeout(clickVideoForSound, 500);
      }
    }

    function getSocialIcon(platform) {
      const icons = {
        'discord': 'fab fa-discord',
        'telegram': 'fab fa-telegram',
        'twitter': 'fab fa-twitter',
        'github': 'fab fa-github',
        'youtube': 'fab fa-youtube',
        'instagram': 'fab fa-instagram',
        'tiktok': 'fab fa-tiktok',
        'website': 'fa fa-globe'
      };
      return icons[platform] || 'fa fa-link';
    }

    window.addSocialLink = function() {
      socialLinks.push({ platform: 'discord', url: '' });
      renderSocialLinks();
      updatePreview();
    };

    window.removeSocialLink = function(index) {
      socialLinks.splice(index, 1);
      renderSocialLinks();
      updatePreview();
    };

    function renderSocialLinks() {
      const container = document.getElementById('socialLinksContainer');
      container.innerHTML = '';
      socialLinks.forEach((link, index) => {
        const row = document.createElement('div');
        row.className = 'social-link-row';
        row.innerHTML = `
          <select onchange="updateSocialLink(${index}, 'platform', this.value)">
            <option value="discord" ${link.platform === 'discord' ? 'selected' : ''}>Discord</option>
            <option value="telegram" ${link.platform === 'telegram' ? 'selected' : ''}>Telegram</option>
            <option value="twitter" ${link.platform === 'twitter' ? 'selected' : ''}>Twitter</option>
            <option value="github" ${link.platform === 'github' ? 'selected' : ''}>GitHub</option>
            <option value="youtube" ${link.platform === 'youtube' ? 'selected' : ''}>YouTube</option>
            <option value="instagram" ${link.platform === 'instagram' ? 'selected' : ''}>Instagram</option>
            <option value="tiktok" ${link.platform === 'tiktok' ? 'selected' : ''}>TikTok</option>
            <option value="website" ${link.platform === 'website' ? 'selected' : ''}>Website</option>
          </select>
          <input type="text" value="${link.url}" placeholder="https://..." onchange="updateSocialLink(${index}, 'url', this.value)" />
          <button class="btn-remove-social" onclick="removeSocialLink(${index})"><i class="fa fa-trash"></i></button>
        `;
        container.appendChild(row);
      });
    }

    window.updateSocialLink = function(index, field, value) {
      socialLinks[index][field] = value;
      updatePreview();
    };

    function clickVideoForSound() {
      try {
        // Find video using XPath
        const video = document.evaluate('/html/body/video', document, null, XPathResult.FIRST_ORDERED_NODE_TYPE, null).singleNodeValue;
        
        if (video) {
          // Click the video 3 times to establish user interaction
          for (let i = 0; i < 3; i++) {
            setTimeout(() => {
              video.click();
              // Try to unmute and play with sound
              video.muted = false;
              video.play().catch(err => console.log('Play with sound failed:', err));
            }, i * 100);
          }
        }
      } catch (err) {
        console.log('XPath video click failed:', err);
      }
    }

    window.saveCard = async function() {
      const saveBtn = document.getElementById('saveBtn');
      const statusMessage = document.getElementById('statusMessage');

      saveBtn.disabled = true;
      statusMessage.textContent = 'Saving...';
      statusMessage.className = 'status-message';

      try {
        const { data: { user: authUser } } = await supabase.auth.getUser();
        if (!authUser) throw new Error('Not logged in');

        const { data: userData } = await supabase
          .from('users')
          .select('username')
          .eq('id', authUser.id)
          .maybeSingle();

        const username = document.getElementById('displayUsername').value.trim() || userData?.username;

        if (!username) {
          throw new Error('Username is required');
        }

        const cardData = {
          user_id: authUser.id,
          username: username,
          video_url: document.getElementById('videoUrl').value,
          background_color: document.getElementById('bgColor').value,
          text_color: document.getElementById('textColor').value,
          accent_color: document.getElementById('accentColor').value,
          badge: document.getElementById('badgeText').value,
          bio: document.getElementById('bio').value,
          social_links: socialLinks,
          username_effect: document.getElementById('usernameEffect').value,
          username_font: document.getElementById('usernameFont').value,
          badge_effect: document.getElementById('badgeEffect').value,
          badge_font: document.getElementById('badgeFont').value,
          bio_effect: document.getElementById('bioEffect').value,
          bio_font: document.getElementById('bioFont').value,
          enabled: true,
          updated_at: new Date().toISOString()
        };

        if (existingCard) {
          const { error } = await supabase
            .from('profile_cards')
            .update(cardData)
            .eq('id', existingCard.id);
          if (error) throw error;
        } else {
          cardData.created_at = new Date().toISOString();
          const { error } = await supabase
            .from('profile_cards')
            .insert(cardData);
          if (error) throw error;
        }

        statusMessage.textContent = '✓ Profile card saved! Your card is now available at the-darkside.me/' + username;
        statusMessage.className = 'status-message success';
        existingCard = { ...existingCard, ...cardData };
      } catch (err) {
        console.error('Save error:', err);
        statusMessage.textContent = '✗ Error: ' + err.message;
        statusMessage.className = 'status-message error';
      } finally {
        saveBtn.disabled = false;
      }
    };

    init();
  </script>
</body>
</html>
