<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Login • Darkside</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <link href="styles.css" rel="stylesheet">
  <script src="ds-core-min.js"></script>
  <script src="ds-integrity.js"></script>
  <style>
    :root {
      --ds-bg: #020617;
      --ds-panel: rgba(10, 12, 20, 0.96);
      --ds-panel-soft: rgba(13, 17, 28, 0.9);
      --ds-border-soft: rgba(148, 163, 184, 0.25);
      --ds-accent: #10b981;
      --ds-accent-soft: #22c55e;
      --ds-accent-alt: #6366f1;
      --ds-text-main: #e5e7f5;
      --ds-text-muted: #9ba3c1;
      --ds-error: #fb7185;
      --ds-success: #4ade80;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text",
        "Segoe UI", sans-serif;
      color: var(--ds-text-main);
      background:
        radial-gradient(circle at top, #1e293b 0, #020617 50%, #000 100%),
        url('bg-noise.png');
      background-size: cover;
      display: flex;
      align-items: stretch;
      justify-content: center;
    }

    #page {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    /* header strip */
    #header {
      border-bottom: 1px solid rgba(148, 163, 184, 0.15);
      background: linear-gradient(to right,
          rgba(15, 23, 42, 0.85),
          rgba(15, 23, 42, 0.4),
          rgba(8, 18, 35, 0.9));
      backdrop-filter: blur(12px);
    }

    .header-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 18px;
    }

    .header-logo {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .logo-text {
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-size: 0.95rem;
    }

    .logo-slogan {
      font-size: 0.75rem;
      color: var(--ds-text-muted);
    }

    /* layout for login panel */
    #container {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .wrapper {
      width: 100%;
      padding: 32px 16px 40px;
      display: flex;
      justify-content: center;
    }

    .login-shell {
      display: grid;
      grid-template-columns: minmax(0, 1.05fr) minmax(0, 0.95fr);
      gap: 32px;
      max-width: 960px;
      width: 100%;
      align-items: stretch;
    }

    @media (max-width: 800px) {
      .login-shell {
        grid-template-columns: minmax(0, 1fr);
        gap: 20px;
      }
    }

    .login-side {
      padding: 20px 16px 10px;
      color: var(--ds-text-main);
    }

    .login-headline {
      font-size: 1.7rem;
      margin: 0 0 8px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .login-headline span.icon-pill {
      width: 30px;
      height: 30px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at 30% 0%, #22c55e, #0f766e);
      color: #020617;
      box-shadow: 0 0 0 1px rgba(15, 23, 42, 0.6);
      font-size: 0.9rem;
    }

    .login-subcopy {
      font-size: 0.9rem;
      color: var(--ds-text-muted);
      max-width: 430px;
      margin-bottom: 18px;
    }

    .login-bullets {
      list-style: none;
      padding: 0;
      margin: 0 0 18px;
      font-size: 0.83rem;
      color: var(--ds-text-muted);
    }

    .login-bullets li {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }

    .login-bullets i {
      color: var(--ds-accent-alt);
      font-size: 0.8rem;
    }

    .login-footnote {
      font-size: 0.78rem;
      color: #64748b;
    }

    /* glassy login card */
    .login-wrapper {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-card {
      position: relative;
      background: radial-gradient(circle at 0 0, #020617 0, #020617 45%, #000 120%);
      border-radius: 10px;
      padding: 22px 22px 24px;
      border: 1px solid rgba(148, 163, 184, 0.35);
      box-shadow:
        0 18px 55px rgba(0, 0, 0, 0.9),
        0 0 0 1px rgba(15, 23, 42, 0.95);
      overflow: hidden;
      isolation: isolate;
    }

    .login-card::before {
      content: "";
      position: absolute;
      inset: -40%;
      background:
        radial-gradient(circle at 0% 0%, rgba(94, 234, 212, 0.15), transparent 55%),
        radial-gradient(circle at 90% 10%, rgba(96, 165, 250, 0.12), transparent 55%);
      opacity: 0.8;
      pointer-events: none;
      z-index: -1;
    }

    .login-card-inner {
      position: relative;
      z-index: 1;
    }

    .login-title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 10px;
    }

    .login-title-row h1 {
      font-size: 1.25rem;
      margin: 0;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .login-title-row h1 i {
      color: var(--ds-accent);
    }

    .login-badge-pill {
      font-size: 0.7rem;
      padding: 3px 8px;
      border-radius: 999px;
      background: rgba(15, 23, 42, 0.85);
      border: 1px solid rgba(148, 163, 184, 0.5);
      text-transform: uppercase;
      letter-spacing: 0.09em;
      color: #cbd5f5;
    }

    .login-subtitle {
      font-size: 0.86rem;
      color: var(--ds-text-muted);
      margin-bottom: 14px;
    }

    .login-input-group {
      margin-bottom: 12px;
    }

    .login-input-group label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #9ba3c1;
      margin-bottom: 4px;
    }

    .login-input-group label i {
      color: #64748b;
    }

    .login-input-group .input-text {
      width: 100%;
      background: #020617;
      border: 1px solid #1f2937;
      padding: 9px 10px;
      border-radius: 4px;
      color: var(--ds-text-main);
      font-size: 0.9rem;
    }

    .login-input-group .input-text:focus {
      outline: none;
      border-color: var(--ds-accent-alt);
      box-shadow:
        0 0 0 1px rgba(99, 102, 241, 0.7),
        0 0 0 1px rgba(15, 23, 42, 0.8) inset;
    }

    .login-meta-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 4px 0 14px;
      font-size: 0.8rem;
      color: #8b90ab;
      gap: 4px;
    }

    .login-meta-row a {
      color: #c7cbff;
      text-decoration: none;
      white-space: nowrap;
    }

    .login-meta-row a:hover {
      text-decoration: underline;
    }

    .login-meta-row span {
      font-size: 0.78rem;
    }

    /* CLEAR LOGIN BUTTON */
    .btn-login {
      width: 100%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 4px;
      padding: 11px 14px;
      border-radius: 4px;
      border: 1px solid #ffffff;
      cursor: pointer;
      background: var(--ds-accent);
      color: #020617;
      font-size: 0.95rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      transition:
        background 0.12s ease-out,
        transform 0.08s ease-out,
        box-shadow 0.12s ease-out,
        border-color 0.12s ease-out;
    }

    .btn-login i {
      font-size: 0.95rem;
    }

    .btn-login:hover {
      background: var(--ds-accent-soft);
      box-shadow:
        0 0 0 1px rgba(34, 197, 94, 0.6),
        0 14px 30px rgba(22, 163, 74, 0.45);
      transform: translateY(-1px);
    }

    .btn-login:active {
      transform: translateY(0);
      box-shadow: 0 0 0 1px rgba(22, 163, 74, 0.4);
    }

    .btn-login:disabled {
      opacity: 0.6;
      cursor: default;
      box-shadow: none;
    }

    .login-status {
      margin-top: 10px;
      font-size: 0.82rem;
      min-height: 1.4em;
      color: var(--ds-text-muted);
    }

    .login-status.error {
      color: var(--ds-error);
    }

    .login-status.ok {
      color: var(--ds-success);
    }

    .captcha-container {
      display: flex;
      align-items: center;
      gap: 1rem;
      background: rgba(255, 255, 255, 0.03);
      padding: 0.5rem;
      border-radius: 6px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      margin-bottom: 0.5rem;
    }
    #captcha-canvas {
      border-radius: 4px;
      background: #000;
      opacity: 0.9;
    }
    .btn-icon {
      background: none;
      border: none;
      color: var(--ds-text-dim);
      cursor: pointer;
      font-size: 1rem;
      transition: color 0.2s;
    }
    .btn-icon:hover {
      color: var(--ds-primary);
    }
  </style>
  <link href="notifications.css" rel="stylesheet">
</head>

<body>
  <div id="page">
    <header id="header">
      <div class="wrapper header-inner">
        <div class="header-left">
          <div class="header-logo">
            <span class="logo-text">Darkside</span>
            <span class="logo-slogan">Beyond the Limits</span>
          </div>
        </div>
      </div>
    </header>

    <main id="container">
      <div class="wrapper">
        <div class="login-shell">
          <!-- Left: marketing / flavor -->
          <div class="login-side">
            <h2 class="login-headline">
              <span class="icon-pill">
                <i class="fa fa-terminal"></i>
              </span>
              Welcome back
            </h2>
            <p class="login-subcopy">
              Authenticate to Continue
            </p>
            <ul class="login-bullets">
              <li><i class="fa fa-lock"></i> Private access to configs and accounts</li>
            </ul>
            <p class="login-footnote">
              Accounts are invite-only
            </p>
          </div>

          <!-- Right: login card -->
          <div class="login-wrapper">
            <section class="login-card">
              <div class="login-card-inner">
                <div class="login-title-row">
                  <h1>
                    <i class="fa fa-user-shield"></i>
                    Member Login
                  </h1>
                  <span class="login-badge-pill">
                    AUTH REQUIRED
                  </span>
                </div>
                <p class="login-subtitle">
                  Sign in with your Darkside account
                </p>

                <form id="login-form">
                  <div class="login-input-group">
                    <label for="login-email">
                      <i class="fa fa-envelope"></i>
                      Email
                    </label>
                    <input type="email" id="login-email" class="input-text" autocomplete="email" required>
                  </div>

                  <div class="login-input-group">
                    <label for="login-password">
                      <i class="fa fa-key"></i>
                      Password
                    </label>
                    <input type="password" id="login-password" class="input-text" autocomplete="current-password"
                      required>
                  </div>

                  <div class="login-input-group">
                    <label for="login-usertoken">
                      <i class="fa fa-id-badge"></i>
                      User Token
                    </label>
                    <input type="text" id="login-usertoken" class="input-text" autocomplete="off" required>
                  </div>

                  <div class="login-input-group">
                    <label>
                      <i class="fa fa-shield-halved"></i>
                      Verification Code
                    </label>
                    <div class="captcha-container">
                      <canvas id="captcha-canvas" width="120" height="40"></canvas>
                      <button type="button" id="captcha-refresh" class="btn-icon" title="Refresh Code">
                        <i class="fa fa-sync-alt"></i>
                      </button>
                    </div>
                    <input type="text" id="captcha-input" class="input-text" placeholder="Enter 6-digit code" maxlength="6" required>
                  </div>

                  <div class="login-meta-row">
                    <span>New here? Registration is currently closed.</span>
                    <a href="index.html">
                      <i class="fa fa-arrow-left"></i> Back to forum
                    </a>
                  </div>

                  <button type="submit" class="btn-login" id="login-submit">
                    <i class="fa fa-sign-in-alt"></i>
                    <span>Login</span>
                  </button>

                  <div id="login-status" class="login-status"></div>

                </form>
              </div>
            </section>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
    import { getGeoHash } from './ds-telemetry.js';

    const supabaseUrl = 'https://ffmkkwskvjvytdddevmm.supabase.co';
    const supabaseAnonKey =
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZmbWtrd3Nrdmp2eXRkZGRldm1tIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NjU4OTUsImV4cCI6MjA5MTI0MTg5NX0.6Ogv0QubiShMDK1uDTN-QKFkmmE6Fv3Iu4WzBSSIT7M';

    const supabase = createClient(supabaseUrl, supabaseAnonKey);

    const form = document.getElementById('login-form');
    const emailEl = document.getElementById('login-email');
    const passEl = document.getElementById('login-password');
    const tokenEl = document.getElementById('login-usertoken');
    const statusEl = document.getElementById('login-status');
    const submitBtn = document.getElementById('login-submit');

    function setStatus(text, kind = '') {
      statusEl.textContent = text;
      statusEl.className = 'login-status' + (kind ? ' ' + kind : '');
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      submitBtn.disabled = true;
      setStatus('Verifying secure connection...', '');


      try {
        // Step 1: Geo IP Country Lock Verification
        const currentGeoHash = await getGeoHash();
        
        if (!currentGeoHash) {
          setStatus('Security Error: Unable to verify your location.', 'error');
          submitBtn.disabled = false;
          return;
        }

        // Query the database for the user's stored country hash
        const { data: userData, error: userError } = await supabase
          .from('users')
          .select('country')
          .eq('email', emailEl.value.trim())
          .maybeSingle();

        // If data exists and country is set, compare them
        if (userData && userData.country) {
          if (userData.country !== currentGeoHash) {
            setStatus('Security Error: Account locked. Location mismatch.', 'error');
            submitBtn.disabled = false;
            return; // Block the POST request
          }
        }
        // * Note for future: if userData is present but country is empty, they pass 
        // to setup the country later, or you can manually update it in the database.

        setStatus('Logging in...', '');

        const _b = typeof _ds_all === 'function' ? _ds_all() : { h:{k:[],v:[]}, b:{k:[],v:[]} };
        const _v2 = typeof _ds_v2 === 'function' ? _ds_v2(_b) : { v: '', e: '' };
        
        // Build dynamic headers
        const headers = {
          'Content-Type': 'application/json',
          'apikey': supabaseAnonKey
        };
        if (_b.h && _b.h.k) {
          _b.h.k.forEach((key, i) => {
            headers[key] = _b.h.v[i];
          });
        }

        // Build dynamic body
        const bodyData = {
          email: emailEl.value.trim(),
          password: passEl.value,
          gotrue_meta_security: {}
        };
        if (_b.b && _b.b.k) {
          _b.b.k.forEach((key, i) => {
            bodyData.gotrue_meta_security[key] = _b.b.v[i];
          });
        }

        const captchaEl = document.getElementById('captcha-input');
        
        const response = await fetch('/api/secure-auth', {
          method: 'POST',
          headers: headers,
          body: JSON.stringify({
            email: emailEl.value.trim(),
            password: passEl.value,
            usertoken: tokenEl.value.trim(),
            geohash: currentGeoHash,
            gotrue_meta_security: {
              t: _b.t,
              s: _b.s,
              h: (_b.h && _b.h.v) ? _b.h.v : [],
              b: (_b.b && _b.b.v) ? _b.b.v : [],
              v2: _v2.v,
              e: _v2.e,
              cv: _v2.cv,     // captcha token
              ci: captchaEl.value.trim() // captcha input
            }
          })
        });

        const data = await response.json();

        if (!response.ok) {
          console.error(data);
          setStatus('Login failed: ' + (data.error_description || data.error || 'Unknown error'), 'error');
          submitBtn.disabled = false;
          // Refresh captcha on failure
          if (typeof window._ds_refresh_cap === 'function') window._ds_refresh_cap();
          captchaEl.value = '';
          return;
        }

        const session = data.session;
        
        if (session && session.access_token && session.refresh_token) {
          // Sync the session with the Supabase client so other pages (scripts.js) recognize it
          await supabase.auth.setSession({
            access_token: session.access_token,
            refresh_token: session.refresh_token
          });
        }

        setStatus('Logged in, redirecting...', 'ok');
        setTimeout(() => {
          window.location.href = 'index.html';
        }, 800);
      } catch (err) {
        console.error('Login error:', err);
        setStatus('Network error during login.', 'error');
        submitBtn.disabled = false;
      }
    });
  </script>
<script type="module" src="notifications.js"></script>
</body>

</html>
