<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Darkside Games • Darkside</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <link href="styles.css" rel="stylesheet">
  <link href="notifications.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    * { box-sizing: border-box; }

    body {
      background: #0a0a0f;
      margin: 0;
      padding: 0;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    /* Header */
    #header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1000;
      background: linear-gradient(to bottom, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0) 100%);
      transition: background 0.3s;
    }
    #header.scrolled { background: #0a0a0f; }

    .header-inner {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 4%;
      height: 68px;
      gap: 20px;
    }

    .header-logo .logo-text {
      color: #e5e7ff;
      font-size: 1.15rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      text-shadow: 0 0 4px rgba(129,140,248,0.9), 0 0 14px rgba(147,51,234,0.75), 0 0 26px rgba(236,72,153,0.55);
    }
    .header-logo .logo-slogan { display: none; }

    /* Navbar */
    #navbar {
      position: fixed;
      top: 68px;
      left: 0;
      right: 0;
      z-index: 999;
      background: linear-gradient(to bottom, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0) 100%);
      transition: background 0.3s;
    }
    #navbar.scrolled { background: #0a0a0f; }

    .navbar-inner { padding: 0 4%; }

    .nav-main {
      display: flex;
      list-style: none;
      margin: 0;
      padding: 0;
      gap: 8px;
    }
    .nav-main a {
      color: #9ca3c9;
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 500;
      padding: 8px 14px;
      border-radius: 6px;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .nav-main a:hover { color: #fff; background: rgba(255,255,255,0.05); }
    .nav-main a.active { color: #818cf8; }

    /* Content */
    .games-content {
      padding-top: 140px;
      padding-bottom: 60px;
      min-height: 100vh;
    }

    .games-hero {
      text-align: center;
      padding: 40px 4% 50px;
    }
    .games-hero h1 {
      font-size: 2.5rem;
      font-weight: 800;
      color: #e5e7ff;
      margin: 0 0 12px;
      text-shadow: 0 0 20px rgba(139,92,246,0.4);
    }
    .games-hero p {
      color: #9ca3c9;
      font-size: 1.1rem;
      max-width: 500px;
      margin: 0 auto;
    }

    /* Game embed */
    .game-embed-wrapper {
      padding: 0 4%;
      max-width: 1200px;
      margin: 0 auto;
    }
    .game-embed {
      width: 100%;
      height: 75vh;
      min-height: 500px;
      border: 1px solid #1f2937;
      border-radius: 12px;
      background: #000;
    }

    /* Auth required overlay */
    .games-auth-required {
      text-align: center;
      padding: 120px 4%;
    }
    .games-auth-required i {
      font-size: 64px;
      color: #8b5cf6;
      margin-bottom: 20px;
    }
    .games-auth-required h2 {
      color: #e5e7ff;
      font-size: 1.5rem;
      margin-bottom: 12px;
    }
    .games-auth-required p {
      color: #9ca3c9;
      margin-bottom: 24px;
    }
    .games-auth-required a {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 28px;
      background: linear-gradient(135deg, #8b5cf6, #6d28d9);
      color: #fff;
      border-radius: 8px;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.2s;
    }
    .games-auth-required a:hover {
      box-shadow: 0 4px 15px rgba(139,92,246,0.4);
    }

    /* Footer */
    .games-footer {
      text-align: center;
      padding: 40px 4%;
      color: #4b5563;
      font-size: 0.8rem;
      margin-top: 60px;
      border-top: 1px solid #1f2937;
    }
  </style>
</head>
<body>

<div id="page">
  <!-- HEADER -->
  <header id="header">
    <div class="wrapper header-inner">
      <div class="header-left">
        <div class="header-logo">
          <a href="index.html" style="text-decoration:none;">
            <span class="logo-text">Darkside</span>
            <span class="logo-slogan">Beyond the Limits</span>
          </a>
        </div>
      </div>
      <div class="header-right">
        <div class="auth-area">
          <div class="auth-links"></div>
        </div>
      </div>
    </div>
  </header>

  <!-- NAVBAR -->
  <nav id="navbar">
    <div class="wrapper navbar-inner">
      <ul class="nav-main">
        <li><a href="index.html"><i class="fa fa-home"></i> Home</a></li>
        <li><a href="movies.html"><i class="fa fa-film"></i> Movies</a></li>
        <li><a href="games.html" class="active"><i class="fa fa-gamepad"></i> Games</a></li>
      </ul>
    </div>
  </nav>

  <!-- CONTENT -->
  <main id="container">
    <div class="games-content" id="games-main">

      <!-- Auth required message (shown when not logged in) -->
      <div class="games-auth-required" id="games-auth-msg" style="display:none;">
        <i class="fa fa-lock"></i>
        <h2>Members Only</h2>
        <p>You must be logged in to access Darkside Games.</p>
        <a href="login.html"><i class="fa fa-sign-in-alt"></i> Login</a>
      </div>

      <!-- Games content (shown when logged in) -->
      <div id="games-content" style="display:none;">

        <div class="games-hero">
          <h1>Darkside Games</h1>
          <p>Exclusive games for Darkside members.</p>
        </div>

        <div class="game-embed-wrapper">
          <iframe class="game-embed" src="https://veck.io/?cg=true&auto_play=true" allow="autoplay; fullscreen; gamepad; clipboard-write" allowfullscreen></iframe>
        </div>

      </div>

      <div class="games-footer">
        &copy; 2026 Darkside Games &mdash; Members Only
      </div>

    </div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
<script src="auth.js"></script>
<script src="notifications.js"></script>
<script type="module">
  import { createClient } from '@supabase/supabase-js';

  const supabaseClient = createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY);

  const { data: userData, error } = await supabaseClient.auth.getUser();
  const authMsg = document.getElementById('games-auth-msg');
  const gamesContent = document.getElementById('games-content');

  if (userData?.user) {
    gamesContent.style.display = '';
    authMsg.style.display = 'none';
  } else {
    gamesContent.style.display = 'none';
    authMsg.style.display = '';
  }

  // Scroll effect for header
  window.addEventListener('scroll', () => {
    const header = document.getElementById('header');
    const navbar = document.getElementById('navbar');
    if (window.scrollY > 50) {
      header.classList.add('scrolled');
      navbar.classList.add('scrolled');
    } else {
      header.classList.remove('scrolled');
      navbar.classList.remove('scrolled');
    }
  });
</script>
<script type="module" src="scripts.js"></script>
<script type="module" src="notifications.js"></script>

</body>
</html>
