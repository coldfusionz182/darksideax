<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Darkside Games • Darkside</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0f; font-family: 'Inter', sans-serif; }

    .game-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 16px;
      background: #111827;
      border-bottom: 1px solid #1f2937;
      height: 48px;
      flex-shrink: 0;
    }
    .game-header-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .game-header-logo {
      color: #e5e7ff;
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      text-shadow: 0 0 4px rgba(129,140,248,0.9), 0 0 14px rgba(147,51,234,0.75);
      text-decoration: none;
    }
    .game-header-title {
      color: #9ca3c9;
      font-size: 0.85rem;
      font-weight: 500;
    }
    .game-header-nav {
      display: flex;
      gap: 6px;
    }
    .game-header-nav a {
      color: #9ca3c9;
      text-decoration: none;
      font-size: 0.8rem;
      font-weight: 500;
      padding: 6px 12px;
      border-radius: 6px;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .game-header-nav a:hover { color: #fff; background: rgba(255,255,255,0.05); }
    .game-header-nav a.active { color: #818cf8; }

    .game-container {
      display: flex;
      flex-direction: column;
      width: 100%;
      height: 100%;
    }

    .game-iframe-wrap {
      flex: 1;
      position: relative;
      overflow: hidden;
    }
    .game-iframe-wrap iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
      background: #000;
    }

    /* Auth gate overlay */
    .auth-gate {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      z-index: 100;
      background: #0a0a0f;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
    }
    .auth-gate i { font-size: 64px; color: #8b5cf6; }
    .auth-gate h2 { color: #e5e7ff; font-size: 1.5rem; }
    .auth-gate p { color: #9ca3c9; margin-bottom: 20px; }
    .auth-gate a {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 28px;
      background: linear-gradient(135deg, #8b5cf6, #6d28d9);
      color: #fff;
      border-radius: 8px;
      font-weight: 600;
      text-decoration: none;
    }
  </style>
</head>
<body>

<div class="game-container">
  <div class="game-header">
    <div class="game-header-left">
      <a href="index.html" class="game-header-logo">Darkside</a>
      <span class="game-header-title"><i class="fa fa-gamepad"></i> Darkside Games</span>
    </div>
    <div class="game-header-nav">
      <a href="index.html"><i class="fa fa-home"></i> Home</a>
      <a href="movies.html"><i class="fa fa-film"></i> Movies</a>
      <a href="games.html" class="active"><i class="fa fa-gamepad"></i> Games</a>
    </div>
  </div>

  <div class="game-iframe-wrap">
    <iframe id="game-iframe"
      allow="autoplay; fullscreen; gamepad; clipboard-write; encrypted-media; microphone; camera"
      allowfullscreen
      src="https://veck.io/?cg=true&auto_play=true">
    </iframe>
  </div>
</div>

<!-- Auth gate overlay -->
<div class="auth-gate" id="auth-gate" style="display:none;">
  <i class="fa fa-lock"></i>
  <h2>Members Only</h2>
  <p>You must be logged in to access Darkside Games.</p>
  <a href="login.html"><i class="fa fa-sign-in-alt"></i> Login</a>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
<script type="module">
  import { createClient } from '@supabase/supabase-js';

  const supabaseClient = createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY);
  const { data: userData } = await supabaseClient.auth.getUser();

  const authGate = document.getElementById('auth-gate');
  const iframe = document.getElementById('game-iframe');

  if (!userData?.user) {
    authGate.style.display = 'flex';
    iframe.src = 'about:blank';
  }
</script>

</body>
</html>
